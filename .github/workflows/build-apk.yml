name: Build Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Patch custom read plan
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          p = Path('app/src/main/java/com/liben/germananki/PlaybackService.java')
          s = p.read_text()
          method = s.index('private List<Segment> makePlan')
          start = s.index('        if (!full) {', method)
          end = s.index('        for (int i = 0; i < wordSlowCount;', start)
          current = s[start:end]

          if 'wordNormalCount' in current and 'phraseCount' in current and 'sentenceCount' in current:
              print('Custom read plan already patched')
          else:
              new = '''        if (!full) {
              Related r = randomRelatedFor(c);
              String phrase = cleanGerman(r.phrase), sentence = cleanGerman(r.example), sentenceCn = cleanChinese(r.exampleCn);
              for (int i = 0; i < wordNormalCount; i++) add(out, word, deLang, "单词", wordNormalSpeed);
              for (int i = 0; i < spellCount; i++) add(out, spellGerman(spellBase(front)), deLang, "拼读", spellSpeed);
              for (int i = 0; i < meaningCount; i++) add(out, cn, zhLang, "中文意思", zhSpeed);
              if (phrase.length() > 0) for (int i = 0; i < phraseCount; i++) add(out, phrase, deLang, "词块", phraseSpeed);
              if (sentence.length() > 0) for (int i = 0; i < sentenceCount; i++) add(out, sentence, deLang, "句子", sentenceSpeed);
              if (sentenceCn.length() > 0) for (int i = 0; i < sentenceCnCount; i++) add(out, sentenceCn, zhLang, "句子中文", zhSpeed);
              return out;
          }
'''
              p.write_text(s[:start] + new + s[end:])
              print('Custom read plan patched')
          PY

      - name: Add build stamp to force APK binary update
        run: |
          set -euo pipefail
          mkdir -p app/src/main/assets
          {
            echo "fixed-custom-read-online-tts"
            date -u +%Y%m%d-%H%M%S
            git rev-parse HEAD
          } > app/src/main/assets/build_stamp.txt

      - name: Verify online MediaPlayer implementation
        run: |
          set -euo pipefail
          ! grep -R "TextToSpeech" app/src/main/java/com/liben/germananki || (echo "TextToSpeech found" && exit 1)
          grep -R "translate_tts" app/src/main/java/com/liben/germananki/PlaybackService.java
          grep -R "MediaPlayer" app/src/main/java/com/liben/germananki/PlaybackService.java
          grep -R "wordNormalCount" app/src/main/java/com/liben/germananki/PlaybackService.java
          grep -R "phraseCount" app/src/main/java/com/liben/germananki/PlaybackService.java
          grep -R "sentenceCount" app/src/main/java/com/liben/germananki/PlaybackService.java

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: german-anki-player-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Commit APK file to repository
        run: |
          set -euo pipefail
          mkdir -p apk
          cp app/build/outputs/apk/debug/app-debug.apk apk/german-anki-player-debug.apk
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f apk/german-anki-player-debug.apk
          if git diff --cached --quiet; then
            echo "No APK changes"
          else
            git commit -m "Build debug APK [skip ci]"
            git push
          fi
