;z-index:10}.bottom button{border:0;background:transparent;color:#8b98ae;border-radius:20px;font-weight:850}.bottom button.on{color:#54a7ff;background:rgba(61,112,255,.13)}.field{display:grid;grid-template-columns:88px 1fr;gap:10px;align-items:center;margin:10px 0}.field label{font-size:13px;color:#9ba8c1}.field select,.field input{width:100%;height:40px;border-radius:14px;border:1px solid rgba(95,134,218,.22);background:#0b1628;color:#fff;padding:0 10px}.field option{color:#111}.toast{position:fixed;left:50%;bottom:104px;transform:translateX(-50%) translateY(15px);opacity:0;transition:.2s;background:#18243c;color:white;border:1px solid rgba(118,146,218,.24);border-radius:999px;padding:10px 15px;font-weight:850;z-index:30}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}@media(max-height:740px){.learn{height:390px}.word{margin-top:38px;font-size:38px}.hint{margin-top:38px}.ans{gap:7px}.ans button{min-height:68px}.kpi{display:none}}

(function(){var DATA=[],S={},P={},voices=[];var LS='lexora_audio_state_v3',LP='lexora_audio_progress_v3';var LV=['A1','A2','B1'];function $(i){return document.getElementById(i)}function esc(s){return String(s||'').replace(/[&<>]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[m]})}function pct(a,b){return b?Math.round(a*100/b):0}function load(k,d){try{return JSON.parse(localStorage.getItem(k)||'')||d}catch(e){return d}}function save(){try{localStorage.setItem(LS,JSON.stringify(S));localStorage.setItem(LP,JSON.stringify(P))}catch(e){}}function msg(s){var t=$('toast');t.innerHTML=esc(s);t.className='toast show';clearTimeout(msg.t);msg.t=setTimeout(function(){t.className='toast'},1200)}function parse(t){var a=t.replace(/\r/g,'').split('\n'),o=[],p,i;for(i=0;i<a.length;i++){if(!a[i])continue;p=a[i].split('\t');o.push({id:p[0]||i,level:p[1]||'',sceneNo:p[2]||'',scene:p[3]||'',word:p[4]||'',pos:p[5]||'',cn:p[6]||'',ex:p[7]||'',exCn:p[8]||'',type:p[9]||'',priority:p[10]||'',tags:p[11]||'',note:p[12]||'',status:p[13]||''})}return o}function loadCards(){var x=new XMLHttpRequest();x.open('GET','cards.tsv',true);x.onreadystatechange=function(){if(x.readyState===4){if(x.status===200||x.status===0){DATA=parse(x.responseText);init()}else fail(x.status)}};try{x.send()}catch(e){fail('blocked')}}function fail(c){$('app').innerHTML='<div class=top><div class=logo>Lexora</div></div><div class="card panel"><div class=h1>cards.tsv 没加载成功</div><div class=sub>index.html 和 cards.tsv 必须放同一目录。错误：'+esc(c)+'</div></div>'}function init(){S=load(LS,{tab:'home',level:'A1',scene:'',index:0,face:'front',random:false,query:'',audioOpen:false,seq:['de','spell','cn','none','none'],gender:['female','female','female','female','female'],rateDe:.9,rateZh:.9,rateSpell:.65,voiceDe:'',voiceZh:''});P=load(LP,{});getVoices();render()}function getVoices(){if(!window.speechSynthesis)return;voices=speechSynthesis.getVoices()||[];if(!voices.length)speechSynthesis.onvoiceschanged=function(){voices=speechSynthesis.getVoices()||[]}}function arr(){var q=(S.query||'').toLowerCase(),a=[],r,t;for(var i=0;i<DATA.length;i++){r=DATA[i];if(r.level!==S.level)continue;if(S.scene&&r.scene!==S.scene)continue;if(q){t=(r.word+' '+r.cn+' '+r.pos+' '+r.scene+' '+r.tags).toLowerCase();if(t.indexOf(q)<0)continue}a.push(r)}return a}function cnt(l){var n=0;for(var i=0;i<DATA.length;i++)if(DATA[i].level===l)n++;return n}function done(l,s){var n=0,r;for(var i=0;i<DATA.length;i++){r=DATA[i];if(l&&r.level!==l)continue;if(s&&r.scene!==s)continue;if(P[r.id]&&P[r.id].seen)n++}return n}function master(l){var n=0,r;for(var i=0;i<DATA.length;i++){r=DATA[i];if(l&&r.level!==l)continue;if(P[r.id]&&P[r.id].ease>=3)n++}return n}function scenes(l){var m={},a=[],r,k;for(var i=0;i<DATA.length;i++){r=DATA[i];if(r.level!==l)continue;k=r.scene;if(!m[k])m[k]={name:k,no:r.sceneNo,count:0,done:0};m[k].count++;if(P[r.id]&&P[r.id].seen)m[k].done++}for(k in m)a.push(m[k]);a.sort(function(x,y){return (a.no||'').localeCompare(b.no||'')});return a}function scenes(l){var m={},a=[],r,k;for(var i=0;i<DATA.length;i++){r=DATA[i];if(r.level!==l)continue;k=r.scene;if(!m[k])m[k]={name:k,no:r.sceneNo,count:0,done:0};m[k].count++;if(P[r.id]&&P[r.id].seen)m[k].done++}for(k in m)a.push(m[k]);a.sort(function(x,y){return (x.no||'').localeCompare(y.no||'')});return a}function next(a,d){if(!a.length)return 0;if(S.random&&a.length>1){var n=S.index,z=0;while(z<40&&n===S.index){n=Math.floor(Math.random()*a.length);z++}return n}return d<0?(S.index-1+a.length)%a.length:(S.index+1)%a.length}function top(){return '<div class=top><div class=logo>Lexora</div><button class=icon data-act=speak>🔊</button></div>'}function levels(){var h='<div class=seg>';for(var i=0;i<LV.length;i++){var l=LV[i];h+='<button data-level='+l+' class='+(S.level===l?'on':'')+'>'+l+'<br><span style=font-size:11px;opacity:.75>'+cnt(l)+' 张</span></button>'}return h+'</div>'}function metric(a,b,c,p){return '<div class=card><div class=label>'+a+'</div><div class=num>'+b+'</div><div class=sub>'+c+'</div><div class=bar><span style=width:'+p+'%></span></div></div>'}function home(){var total=DATA.length,m=master(),h='<div class=h1>德语 B1 目标词表</div><div class=sub>先按等级，再按场景。共 '+total+' 张。</div>';h+='<div class=kpi>'+metric('今日新词','20','目标',100)+metric('待复习','48','约14分钟',48)+metric('已掌握',m,'累计',pct(m,total))+'</div><div class=title2>等级入口</div>'+levels()+'<div class=list>';for(var i=0;i<LV.length;i++){var l=LV[i],c=cnt(l),d=done(l),p=pct(d,c);h+='<div class=scene data-go='+l+'><div class=badge>'+l+'</div><div><div class=name>'+(l==='A1'?'基础生存沟通':l==='A2'?'日常办事与租房':'观点表达与工作实习')+'</div><div class=meta>'+c+' 张 · 已学 '+d+'</div><div class=bar style=margin-top:8px><span style=width:'+p+'%></span></div></div><div class=chev>›</div></div>'}return h+'</div>'}function decks(){var a=scenes(S.level),h='<div class=h1>卡片库</div><div class=sub>先选等级，再选场景。</div>'+levels()+'<input class=search id=q value="'+esc(S.query)+'" placeholder=搜索德语/中文/场景><div class=title2>'+S.level+' 场景</div><div class=list>';for(var i=0;i<a.length;i++){var s=a[i],p=pct(s.done,s.count);h+='<div class=scene data-scene="'+esc(s.name)+'"><div class=badge>'+esc(s.no||S.level)+'</div><div><div class=name>'+esc(s.name)+'</div><div class=meta>'+s.count+' 张 · 已学 '+s.done+' · '+p+'%</div><div class=bar style=margin-top:8px><span style=width:'+p+'%></span></div></div><div class=chev>›</div></div>'}return h+'</div>'}function audioPanel(){var kinds=[['none','不播放'],['de','德语单词'],['spell','拼写'],['cn','中文意思'],['ex','德语例句'],['excn','例句中文']];function sel(i){var h='<select data-seq='+i+'>';for(var j=0;j<kinds.length;j++)h+='<option value='+kinds[j][0]+' '+(S.seq[i]===kinds[j][0]?'selected':'')+'>'+kinds[j][1]+'</option>';return h+'</select>'}function gender(i){var g=S.gender[i]||'female';return '<select data-gender='+i+'><option value=female '+(g==='female'?'selected':'')+'>女声优先</option><option value=male '+(g==='male'?'selected':'')+'>男声优先</option><option value=default '+(g==='default'?'selected':'')+'>系统 +' · '+esc(r.scene)+'</span><span data-speak="'+esc(r.word)+'">🔊</span></div><div class=word2>'+esc(r.word)+'</div><div class=cn>'+esc(r.cn)+'</div><div class=pos>'+esc(r.pos)+'</div>';if(r.ex)h+='<div class=info><b>例句</b>'+esc(r.ex)+'<br>'+esc(r.exCn)+'</div>';h+='<div class=info><b>场景</b>'+esc(r.level)+' · '+esc(r.scene)+' · '+esc(r.sceneNo)+'</div></div></div></div><div class=ans><button class=red data-rate=0>忘记<small>&lt;10分钟</small></button><button class=amber data-rate=1>困难<small>10分钟</small></button><button class=blue data-rate=2>一般<small>1天后</small></button><button class=green data-rate=3>简单<small>4天后</small></button></div>';return h}function stats(){var total=DATA.length,h='<div class=h1>统计</div><div class=sub>按等级统计。</div><div class=kpi>'+metric('总卡片',total,'张',100)+metric('已学习',done(),'张',pct(done(),total))+metric('已掌握',master(),'张',pct(master(),total))+'</div><div class="card panel">';for(var i=0;i<LV.length;i++){var l=LV[i],c=cnt(l),d=done(l),p=pct(d,c);h+='<div class=field><label>'+l+'</label><div><div class=bar><span style=width:'+p+'%></span></div><div class=meta>'+d+'/'+c+'</div></div></div>'}return h+'</div>'}function mine(){return '<div class=h1>我的</div><div class="card panel"><b>Lexora 学习者</b><br><br><button class="btn on" data-action=reset>清空学习记录</button></div>'}function render(){var h=top();if(S.tab==='home')h+=home();else if(S.tab==='decks')h+=decks();else if(S.tab==='learn')h+=learn();else if(S.tab==='stats')h+=stats();else h+=mine();$('app').innerHTML=h;nav();bind();save()}function nav(){var tabs=[['home','首页','⌂'],['decks','卡片库','▣'],['learn','学习','📖'],['stats','统计','▥'],['mine','我的','♙']],h='';for(var i=0;i<tabs.length;i++)h+='<button data-tab='+tabs[i][0]+' class='+(S.tab===tabs[i][0]?'on':'')+'>'+tabs[i][2]+'<br>'+tabs[i][1]+'</button>';$('bottom').innerHTML=h}function cur(){var a=arr();return a[S.index]||a[0]}function seqText(r,k,i){if(k==='de')return {text:r.word,lang:'de-DE',rate:S.rateDe,gender:S.gender[i]||'female'};if(k==='spell')re
