<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>德语 Anki</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%;overflow:hidden}body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;color:#fff3df;background:radial-gradient(circle at 10% 0%,rgba(255,190,100,.28),transparent 30%),radial-gradient(circle at 95% 8%,rgba(110,120,255,.25),transparent 35%),linear-gradient(150deg,#14100c,#2a2118 55%,#100c09)}button,input,select{font:inherit}.app{width:min(100vw,540px);height:100dvh;margin:0 auto;padding:calc(env(safe-area-inset-top) + 12px) 13px calc(env(safe-area-inset-bottom) + 96px);display:grid;grid-template-rows:auto auto auto 1fr auto;gap:9px}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}.title{font-size:30px;font-weight:1000;letter-spacing:-.08em;line-height:.95}.sub{margin-top:5px;color:rgba(255,243,223,.62);font-size:13px}.count{border-radius:999px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.12);padding:9px 12px;color:#ffd27d;font-weight:950}.search{display:grid;grid-template-columns:1fr auto;gap:8px}.search input{height:42px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.09);color:#fff3df;border-radius:18px;padding:0 13px;outline:none}.pill{border:0;border-radius:999px;padding:0 14px;font-weight:950;background:linear-gradient(135deg,#fff1cf,#ffc66b);color:#24170e}.settings{display:grid;grid-template-columns:1fr 1fr 72px 72px;gap:7px}.settings select,.settings input{height:38px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.09);color:#fff3df;border-radius:15px;padding:0 8px;outline:none;font-size:12px;font-weight:850}.settings option{color:#111}.chips{display:flex;gap:8px;overflow:auto;scrollbar-width:none}.chips::-webkit-scrollbar{display:none}.chip{flex:0 0 auto;border:1px solid rgba(255,255,255,.11);background:rgba(255,255,255,.075);color:rgba(255,243,223,.72);border-radius:999px;padding:8px 11px;font-weight:850;font-size:13px}.chip.on{background:linear-gradient(135deg,#ffe8b7,#ffbd5a);color:#2a1a0e}.card{position:relative;min-height:0;border-radius:30px;background:linear-gradient(145deg,rgba(255,255,255,.17),rgba(255,255,255,.075)),radial-gradient(circle at 12% 10%,rgba(255,210,125,.18),transparent 30%);border:1px solid rgba(255,255,255,.14);box-shadow:0 28px 70px rgba(0,0,0,.38);overflow:hidden;display:grid;grid-template-rows:auto 1fr auto}.head{display:flex;gap:7px;flex-wrap:wrap;padding:14px 15px 4px}.tag{border-radius:999px;background:rgba(0,0,0,.16);border:1px solid rgba(255,255,255,.09);padding:5px 8px;color:rgba(255,243,223,.66);font-size:12px;font-weight:850}.body{min-height:0;overflow:auto;padding:8px 18px;display:flex;flex-direction:column;justify-content:center;gap:14px}.front{font-size:clamp(44px,15vw,82px);font-weight:1000;line-height:.95;letter-spacing:-.085em;text-shadow:0 18px 45px rgba(0,0,0,.25);word-break:break-word}.meaning{font-size:clamp(28px,8vw,46px);font-weight:1000;line-height:1.12;letter-spacing:-.05em;color:#fff2d5}.box{border-radius:20px;background:rgba(0,0,0,.13);border:1px solid rgba(255,255,255,.08);padding:12px 13px;color:rgba(255,243,223,.78);font-size:17px;line-height:1.45;font-weight:700}.box b{display:block;color:#ffd27d;margin-bottom:5px}.foot{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:12px}.action{border:0;border-radius:18px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.10);color:rgba(255,243,223,.86);padding:13px 6px;font-weight:950}.action.main{background:linear-gradient(135deg,#fff0c9,#ffc164);color:#23170e}.nav{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}.nav button{height:44px;border:0;border-radius:19px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.10);color:#fff3df;font-weight:950}.nav .main{background:linear-gradient(135deg,#ffeeca,#ffc36a);color:#24170e}.toast{position:fixed;left:50%;bottom:110px;transform:translateX(-50%) translateY(20px);opacity:0;transition:.22s;background:#ffdf9c;color:#2a1a0e;border-radius:999px;padding:10px 14px;font-weight:950;z-index:30}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.nativeHint{position:fixed;left:12px;right:12px;bottom:calc(env(safe-area-inset-bottom) + 12px);border-radius:22px;background:rgba(18,14,10,.82);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.12);padding:8px;display:grid;grid-template-columns:1fr auto;gap:8px;z-index:20}.nativeHint button{border:0;border-radius:999px;padding:12px 13px;font-weight:950}.nativeHint .start{background:linear-gradient(135deg,#fff2d0,#ffc76f);color:#24170e}.nativeHint .stop{background:rgba(255,255,255,.14);color:#fff4df}@media(max-height:700px){.chips{display:none}.front{font-size:42px}.settings{grid-template-columns:1fr 1fr}.app{gap:7px}}
</style>
</head>
<body>
<main class="app">
  <div class="top"><div><div class="title">德语 B1 高段</div><div class="sub" id="sub">Anki 卡片 · 原声 APK</div></div><div class="count" id="count">1/0</div></div>
  <div class="search"><input id="q" placeholder="搜索德语 / 中文 / 章节"><button class="pill" id="mode">猜意思</button></div>
  <div class="settings">
    <select id="deLang"><option value="de">德语原声</option><option value="de-DE">德国声线</option><option value="de-AT">奥地利声线</option><option value="de-CH">瑞士声线</option></select>
    <select id="zhLang"><option value="zh-CN">普通话</option><option value="zh-TW">台湾中文</option><option value="zh-HK">香港中文</option></select>
    <input id="speed" value="0.9" inputmode="decimal" title="速度">
    <input id="gap" value="650" inputmode="numeric" title="间隔">
  </div>
  <div class="chips" id="chips"></div>
  <section class="card" id="card"><div class="head" id="head"></div><div class="body" id="body"></div><div class="foot" id="foot"></div></section>
  <nav class="nav"><button id="prev">上一张</button><button class="main" id="flip">显示答案</button><button id="next">下一张</button><button id="random">随机</button></nav>
</main>
<div class="nativeHint"><button class="start" id="nativeStart">原声息屏播放</button><button class="stop" id="nativeStop">停止</button></div>
<div class="toast" id="toast">OK</div>
<script>
let cards=[],filtered=[],index=0,flipped=false,quiz=false,deck='全部',query='';
const $=id=>document.getElementById(id);
function esc(s){return String(s||'').replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function toast(s){$('toast').textContent=s;$('toast').classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>$('toast').classList.remove('show'),1100)}
function getNativeOptions(){return{deRepeat:2,zhRepeat:1,gapMs:parseInt($('gap').value)||650,speed:String(parseFloat($('speed').value)||0.9),deLang:$('deLang').value||'de',zhLang:$('zhLang').value||'zh-CN'}}
async function load(){try{let t=await fetch('cards.tsv').then(r=>r.text());cards=t.trim().split(/\n+/).map(line=>{let p=line.split('\t');return{id:+p[0]||0,front:p[1]||'',meaning:p[2]||'',deck:p[3]||'默认'}})}catch(e){cards=[{id:1,front:'machen',meaning:'做；进行',deck:'核心'}]}renderChips();apply()}
function renderChips(){let ds=['全部',...new Set(cards.map(c=>c.deck))];$('chips').innerHTML=ds.map(d=>`<button class="chip ${deck===d?'on':''}" data-d="${esc(d)}">${esc(d)}</button>`).join('');document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{deck=b.dataset.d;index=0;renderChips();apply()})}
function apply(){query=$('q').value.trim().toLowerCase();filtered=cards.filter(c=>(deck==='全部'||c.deck===deck)&&(!query||(c.front+' '+c.meaning+' '+c.deck).toLowerCase().includes(query)));if(index>=filtered.length)index=0;render()}
function cur(){return filtered[index]||cards[0]}
function render(){let c=cur();if(!c){$('body').innerHTML='<div class="box">没有卡片</div>';return}$('count').textContent=(index+1)+'/'+filtered.length;$('sub').textContent=cards.length+' 词条 · '+deck;$('head').innerHTML=`<span class="tag">${esc(c.deck)}</span><span class="tag">${quiz?'猜意思':'复习卡'}</span><span class="tag">${$('deLang').selectedOptions[0].textContent}</span>`;if(quiz){renderQuiz(c)}else{renderReview(c)}}
function renderReview(c){$('body').innerHTML=flipped?`<div class="meaning">${esc(c.meaning)}</div><div class="box"><b>德语</b>${esc(c.front)}</div>`:`<div class="front">${esc(c.front)}</div><div class="box">${esc(c.deck)}</div>`;$('foot').innerHTML=`<button class="action" onclick="speak()">🔊 原声</button><button class="action main" onclick="flipCard()">${flipped?'隐藏':'翻开'}</button><button class="action" onclick="wrong()">不认识</button>`;$('flip').textContent=flipped?'隐藏答案':'显示答案'}
function renderQuiz(c){let opts=[c,...cards.filter(x=>x.id!==c.id).sort(()=>Math.random()-.5).slice(0,3)].sort(()=>Math.random()-.5);$('body').innerHTML=`<div class="front">${esc(c.front)}</div><div class="box">${opts.map(o=>`<button class="action" style="width:100%;margin:4px 0;text-align:left" onclick="answer(${o.id===c.id})">${esc(o.meaning)}</button>`).join('')}</div>`;$('foot').innerHTML=`<button class="action" onclick="speak()">🔊 原声</button><button class="action main" onclick="flipCard()">答案</button><button class="action" onclick="next()">跳过</button>`;$('flip').textContent='答案'}
function answer(ok){toast(ok?'答对了':'错了');if(ok)setTimeout(next,500)}function flipCard(){flipped=!flipped;quiz=false;render()}function wrong(){flipped=true;render()}function next(){index=(index+1)%filtered.length;flipped=false;render()}function prev(){index=(index-1+filtered.length)%filtered.length;flipped=false;render()}function random(){index=Math.floor(Math.random()*filtered.length);flipped=false;render();toast('随机抽卡')}function speak(){let c=cur(),o=getNativeOptions();let a=new Audio('https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl='+encodeURIComponent(o.deLang)+'&q='+encodeURIComponent(c.front));a.play().catch(()=>toast('网页原声失败'))}
function startNative(){let o=getNativeOptions();if(window.NativePlayer&&NativePlayer.startWithOptions){NativePlayer.startWithOptions(index+1,o.deRepeat,o.zhRepeat,o.gapMs,o.speed,o.deLang,o.zhLang);toast('已启动原声息屏播放')}else if(window.NativePlayer){NativePlayer.start(index+1)}}
$('q').oninput=apply;$('deLang').onchange=render;$('zhLang').onchange=render;$('mode').onclick=()=>{quiz=!quiz;flipped=false;$('mode').textContent=quiz?'复习卡':'猜意思';render()};$('prev').onclick=prev;$('next').onclick=next;$('random').onclick=random;$('flip').onclick=flipCard;$('nativeStart').onclick=startNative;$('nativeStop').onclick=()=>{if(window.NativePlayer)NativePlayer.stop();toast('已停止')};
load();
</script>
</body>
</html>
