<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Lexora 德语 Anki</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;background:#050914;color:#f5f8ff;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif}
body{background:radial-gradient(circle at 12% 0%,rgba(42,145,255,.28),transparent 30%),radial-gradient(circle at 96% 4%,rgba(142,68,255,.24),transparent 32%),linear-gradient(180deg,#050914,#07101d 58%,#040811)}
button,input,select{font:inherit}button{cursor:pointer}
#app{width:min(100vw,520px);margin:0 auto;padding:calc(env(safe-area-inset-top) + 16px) 16px calc(env(safe-area-inset-bottom) + 104px)}
.top{display:flex;align-items:center;justify-content:space-between;margin:8px 0 12px}.logo{font-size:36px;font-weight:950;background:linear-gradient(90deg,#35a6ff,#9d52ff);-webkit-background-clip:text;background-clip:text;color:transparent}
.icon{width:42px;height:42px;border-radius:16px;border:1px solid rgba(160,180,230,.18);background:rgba(12,22,40,.72);color:#dfe9ff;font-size:21px}
.h1{font-size:29px;line-height:1.1;font-weight:950;margin:8px 0}.sub{color:#9ba8c1;font-size:14px;line-height:1.45}
.card{border:1px solid rgba(123,156,229,.18);background:linear-gradient(180deg,rgba(14,27,49,.88),rgba(8,17,31,.9));border-radius:24px;box-shadow:0 18px 50px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.04)}
.panel{padding:14px;margin:11px 0}.row2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:9px 0}.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:11px 0}
.btn,.row3 button{border:1px solid rgba(116,146,222,.18);background:rgba(10,21,39,.76);color:#a6b4cc;border-radius:17px;padding:11px 6px;font-weight:900}
.btn.on,.row3 button.on{color:#fff;background:linear-gradient(135deg,#137fff,#7e3cff);box-shadow:0 0 22px rgba(64,111,255,.28)}
.title2{font-size:19px;font-weight:950;margin:16px 0 9px}.list{display:grid;gap:10px}
.scene{display:grid;grid-template-columns:50px 1fr auto;align-items:center;gap:12px;padding:13px;border-radius:22px;border:1px solid rgba(111,146,220,.18);background:linear-gradient(180deg,rgba(13,25,45,.86),rgba(7,16,31,.88))}
.badge{width:50px;height:50px;border-radius:17px;display:grid;place-items:center;font-size:16px;font-weight:950;background:linear-gradient(145deg,rgba(43,137,255,.35),rgba(132,71,255,.28));border:1px solid rgba(96,144,255,.28)}
.name{font-size:18px;font-weight:900;line-height:1.2}.meta{font-size:12px;color:#94a3bc;margin-top:4px}.chev{font-size:28px;color:#70809b}
.bar{height:7px;border-radius:999px;background:rgba(133,153,195,.18);overflow:hidden}.bar span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,#2d95ff,#8a45ff)}
.search{height:46px;width:100%;border-radius:17px;border:1px solid rgba(95,134,218,.25);background:rgba(8,17,31,.72);color:#fff;padding:0 14px;outline:none;margin:8px 0}
.learn{height:350px;margin:10px 0 12px;position:relative;perspective:1200px}.inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .45s}.learn.flip .inner{transform:rotateY(180deg)}
.face{position:absolute;inset:0;border-radius:26px;border:1.5px solid rgba(58,143,255,.62);background:radial-gradient(circle at 50% 45%,rgba(66,111,255,.20),transparent 35%),linear-gradient(180deg,rgba(12,24,44,.96),rgba(7,14,27,.98));padding:17px;box-shadow:0 0 26px rgba(65,123,255,.14),inset 0 1px 0 rgba(255,255,255,.05);backface-visibility:hidden;overflow:hidden}
.face.back{transform:rotateY(180deg);overflow:auto}.lh{display:flex;align-items:center;justify-content:space-between;color:#9aa7bd;font-size:13px;margin-bottom:8px}.tag{display:inline-flex;padding:6px 10px;border-radius:999px;background:rgba(80,83,255,.14);border:1px solid rgba(110,125,255,.24);color:#70a9ff;font-weight:800}
.word{font-family:Georgia,"Times New Roman",serif;text-align:center;font-size:39px;line-height:1.08;font-weight:900;margin:38px 0 12px;word-break:break-word}.word2{font-family:Georgia,"Times New Roman",serif;text-align:center;font-size:28px;font-weight:900;margin:8px 0}
.pos{text-align:center;color:#7aa8ff;font-size:17px;margin:5px 0}.hint{text-align:center;color:#9aa7bd;margin-top:40px;line-height:1.55;font-size:15px}.cn{text-align:center;font-size:27px;font-weight:950;line-height:1.28;margin:9px 0}
.info{border:1px solid rgba(134,158,218,.16);background:rgba(4,12,24,.42);border-radius:16px;padding:10px;margin-top:9px;line-height:1.43;color:#dbe5f7}.info b{display:block;font-size:13px;color:#5aa7ff;margin-bottom:4px}
.ans{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.ans button{min-height:65px;border-radius:16px;border:1px solid rgba(255,255,255,.12);background:rgba(11,20,35,.78);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-weight:950}.ans small{font-size:10px;color:#acb6ca}
.red{color:#ff626e}.amber{color:#ff9b22}.blue{color:#55a5ff}.green{color:#2bdf9a}
.field{display:grid;grid-template-columns:92px 1fr;gap:9px;align-items:center;margin:9px 0}.field label{font-size:13px;color:#9ba8c1}.field select,.field input{width:100%;height:40px;border-radius:14px;border:1px solid rgba(95,134,218,.22);background:#0b1628;color:#fff;padding:0 10px}.field option{color:#111}
.bottom{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 10px);transform:translateX(-50%);width:min(calc(100vw - 28px),500px);height:72px;border-radius:27px;border:1px solid rgba(128,153,210,.18);background:rgba(8,17,31,.9);backdrop-filter:blur(14px);display:grid;grid-template-columns:repeat(5,1fr);gap:2px;padding:7px;z-index:10}.bottom button{border:0;background:transparent;color:#8b98ae;border-radius:20px;font-weight:850}.bottom button.on{color:#54a7ff;background:rgba(61,112,255,.13)}
.toast{position:fixed;left:50%;bottom:104px;transform:translateX(-50%) translateY(15px);opacity:0;transition:.2s;background:#18243c;color:white;border:1px solid rgba(118,146,218,.24);border-radius:999px;padding:10px 15px;font-weight:850;z-index:30}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-height:740px){.learn{height:330px}.word{margin-top:30px;font-size:36px}.hint{margin-top:30px}.ans button{min-height:60px}.panel{padding:12px}}
</style>
</head>
<body>
<div id="app"><div class="top"><div class="logo">Lexora</div></div><div class="card panel">正在加载词表……</div></div>
<div id="bottom" class="bottom"></div><div id="toast" class="toast"></div>
<script>
(function(){
var DATA=[],S={},P={},voices=[],playing=false,token=0;
var LS='lexora_stable_audio_v1',LP='lexora_stable_progress_v1';
var LV=['A1','A2','B1'];
function $(id){return document.getElementById(id)}
function esc(s){return String(s||'').replace(/[&<>\"]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[m]})}
function enc(s){return encodeURIComponent(String(s||''))}
function dec(s){try{return decodeURIComponent(s||'')}catch(e){return s||''}}
function pct(a,b){return b?Math.round(a*100/b):0}
function load(k,d){try{return JSON.parse(localStorage.getItem(k)||'')||d}catch(e){return d}}
function save(){try{localStorage.setItem(LS,JSON.stringify(S));localStorage.setItem(LP,JSON.stringify(P))}catch(e){}}
function msg(s){var t=$('toast');t.innerHTML=esc(s);t.className='toast show';clearTimeout(msg.t);msg.t=setTimeout(function(){t.className='toast'},1200)}
function parseTSV(t){var lines=t.replace(/\r/g,'').split('\n'),out=[],i,p;for(i=0;i<lines.length;i++){if(!lines[i])continue;p=lines[i].split('\t');out.push({id:p[0]||String(i+1),level:p[1]||'',sceneNo:p[2]||'',scene:p[3]||'',word:p[4]||'',pos:p[5]||'',cn:p[6]||'',ex:p[7]||'',exCn:p[8]||'',type:p[9]||'',priority:p[10]||'',tags:p[11]||'',note:p[12]||'',status:p[13]||''})}return out}
function loadCards(){var x=new XMLHttpRequest();x.open('GET','cards.tsv',true);x.onreadystatechange=function(){if(x.readyState===4){if(x.status===200||x.status===0){DATA=parseTSV(x.responseText);init()}else fail(x.status)}};try{x.send()}catch(e){fail('blocked')}}
function fail(code){$('app').innerHTML='<div class="top"><div class="logo">Lexora</div></div><div class="card panel"><div class="h1">词表加载失败</div><div class="sub">index.html 和 cards.tsv 必须在同一目录。错误：'+esc(code)+'</div></div>'}
function init(){S=load(LS,{tab:'home',level:'A1',scene:'',index:0,face:'front',random:false,query:'',audioOpen:true,seq:['de','spell','cn','none','none'],gender:['female','female','female','female','female'],rateDe:.9,rateSpell:.65,rateZh:.9,gap:450});P=load(LP,{});loadVoices();render()}
function loadVoices(){if(!window.speechSynthesis)return;voices=speechSynthesis.getVoices()||[];if(!voices.length)speechSynthesis.onvoiceschanged=function(){voices=speechSynthesis.getVoices()||[]}}
function filtered(){var q=(S.query||'').toLowerCase(),a=[],r,t,i;for(i=0;i<DATA.length;i++){r=DATA[i];if(r.level!==S.level)continue;if(S.scene&&r.scene!==S.scene)continue;if(q){t=(r.word+' '+r.cn+' '+r.pos+' '+r.scene+' '+r.tags).toLowerCase();if(t.indexOf(q)<0)continue}a.push(r)}return a}
function countLevel(lv){var n=0;for(var i=0;i<DATA.length;i++)if(DATA[i].level===lv)n++;return n}
function learned(lv,sc){var n=0,r;for(var i=0;i<DATA.length;i++){r=DATA[i];if(lv&&r.level!==lv)continue;if(sc&&r.scene!==sc)continue;if(P[r.id]&&P[r.id].seen)n++}return n}
function mastered(lv){var n=0,r;for(var i=0;i<DATA.length;i++){r=DATA[i];if(lv&&r.level!==lv)continue;if(P[r.id]&&P[r.id].ease>=3)n++}return n}
function sceneList(lv){var m={},a=[],r,k;for(var i=0;i<DATA.length;i++){r=DATA[i];if(r.level!==lv)continue;k=r.scene;if(!m[k])m[k]={name:k,no:r.sceneNo,count:0,done:0};m[k].count++;if(P[r.id]&&P[r.id].seen)m[k].done++}for(k in m)a.push(m[k]);a.sort(function(x,y){return (x.no||'').localeCompare(y.no||'')});return a}
function nextIndex(a,dir){if(!a.length)return 0;if(S.random&&a.length>1){var n=S.index,z=0;while(z<40&&n===S.index){n=Math.floor(Math.random()*a.length);z++}return n}return dir<0?(S.index-1+a.length)%a.length:(S.index+1)%a.length}
function top(){return '<div class="top"><div class="logo">Lexora</div><button class="icon" data-act="speak">🔊</button></div>'}
function levels(){var h='<div class="row3">',i,l;for(i=0;i<LV.length;i++){l=LV[i];h+='<button data-level="'+l+'" class="'+(S.level===l?'on':'')+'">'+l+'<br><span style="font-size:11px;opacity:.75">'+countLevel(l)+' 张</span></button>'}return h+'</div>'}
function home(){var total=DATA.length,m=mastered(),h='<div class="h1">德语 B1 目标词表</div><div class="sub">按等级和场景背。共 '+total+' 张。</div>';h+='<div class="title2">等级入口</div>'+levels()+'<div class="list">';for(var i=0;i<LV.length;i++){var l=LV[i],c=countLevel(l),d=learned(l),p=pct(d,c);h+='<div class="scene" data-go="'+l+'"><div class="badge">'+l+'</div><div><div class="name">'+(l==='A1'?'基础生存沟通':l==='A2'?'日常办事与租房':'观点表达与工作实习')+'</div><div class="meta">'+c+' 张 · 已学 '+d+'</div><div class="bar" style="margin-top:8px"><span style="width:'+p+'%"></span></div></div><div class="chev">›</div></div>'}return h+'</div>'}
function decks(){var a=sceneList(S.level),h='<div class="h1">卡片库</div><div class="sub">先选等级，再选场景。</div>'+levels()+'<input class="search" id="q" value="'+esc(S.query)+'" placeholder="搜索德语 / 中文 / 场景"><div class="title2">'+S.level+' 场景</div><div class="list">';for(var i=0;i<a.length;i++){var s=a[i],p=pct(s.done,s.count);h+='<div class="scene" data-scene="'+enc(s.name)+'"><div class="badge">'+esc(s.no||S.level)+'</div><div><div class="name">'+esc(s.name)+'</div><div class="meta">'+s.count+' 张 · 已学 '+s.done+' · '+p+'%</div><div class="bar" style="margin-top:8px"><span style="width:'+p+'%"></span></div></div><div class="chev">›</div></div>'}return h+'</div>'}
function audioPanel(){var kinds=[['none','不播放'],['de','德语单词'],['spell','拼写'],['cn','中文意思'],['ex','德语例句'],['excn','例句中文']];function seqSel(i){var h='<select data-seq="'+i+'">';for(var j=0;j<kinds.length;j++)h+='<option value="'+kinds[j][0]+'" '+(S.seq[i]===kinds[j][0]?'selected':'')+'>'+kinds[j][1]+'</option>';return h+'</select>'}function genderSel(i){var g=S.gender[i]||'female';return '<select data-gender="'+i+'"><option value="female" '+(g==='female'?'selected':'')+'>女声优先</option><option value="male" '+(g==='male'?'selected':'')+'>男声优先</option><option value="default" '+(g==='default'?'selected':'')+'>系统默认</option></select>'}var h='<div class="card panel"><div class="row2"><button class="btn on" data-auto="1">自动连播</button><button class="btn" data-stop="1">停止播放</button></div><div class="row2"><button class="btn" data-play="1">只读当前</button><button class="btn on" data-bg="1">APK息屏连播</button></div>';for(var i=0;i<5;i++){h+='<div class="field"><label>第'+(i+1)+'步</label>'+seqSel(i)+'</div><div class="field"><label>声线</label>'+genderSel(i)+'</div>'}h+='<div class="field"><label>德语速度</label><input type="range" min=".45" max="1.4" step=".05" value="'+S.rateDe+'" data-speed="rateDe"></div><div class="field"><label>拼写速度</label><input type="range" min=".35" max="1.1" step=".05" value="'+S.rateSpell+'" data-speed="rateSpell"></div><div class="field"><label>中文速度</label><input type="range" min=".45" max="1.4" step=".05" value="'+S.rateZh+'" data-speed="rateZh"></div><div class="field"><label>间隔</label><input type="range" min="120" max="1500" step="30" value="'+S.gap+'" data-speed="gap"></div><div class="sub">声音来自手机系统。想自然一点，需要在手机系统里安装/启用高质量德语语音包。网页只能调用已有声音。</div></div>';return h}
function learn(){var a=filtered();if(S.index>=a.length)S.index=0;var r=a[S.index],h='<div class="h1">学习</div><div class="sub">当前：'+esc(S.level)+(S.scene?' · '+esc(S.scene):'')+(playing?' · 自动播放中':'')+'</div>'+levels();if(!S.scene)return h+'<div class="card panel">先到卡片库选一个具体场景。</div>';h+='<div class="row2"><button class="btn '+(!S.random?'on':'')+'" data-mode="order">顺序出卡</button><button class="btn '+(S.random?'on':'')+'" data-mode="random">随机出卡</button></div><div class="row2"><button class="btn on" data-auto="1">自动连播</button><button class="btn" data-audio="1">顺序/速度/声音</button></div>';if(S.audioOpen)h+=audioPanel();if(!r)return h+'<div class="card panel">没有卡片。</div>';h+='<div id="learnCard" class="learn '+(S.face==='back'?'flip':'')+'" data-flip="1"><div class="inner"><div class="face"><div class="lh"><span>'+(S.index+1)+' / '+a.length+'</span><span class="tag">'+esc(r.level)+' · '+esc(r.scene)+'</span><span data-speak="'+esc(r.word)+'">🔊</span></div><div class="word">'+esc(r.word)+'</div><div class="pos">'+esc(r.pos)+'</div><div class="hint">点“自动连播”<br>会自动读完并跳下一张</div></div><div class="face back"><div class="lh"><span>'+(S.index+1)+' / '+a.length+'</span><span class="tag">'+esc(r.level)+' · '+esc(r.scene)+'</span></div><div class="word2">'+esc(r.word)+'</div><div class="cn">'+esc(r.cn)+'</div><div class="pos">'+esc(r.pos)+'</div>';if(r.ex)h+='<div class="info"><b>例句</b>'+esc(r.ex)+'<br>'+esc(r.exCn)+'</div>';h+='<div class="info"><b>场景</b>'+esc(r.level)+' · '+esc(r.scene)+' · '+esc(r.sceneNo)+'</div></div></div></div><div class="ans"><button class="red" data-rate="0">忘记<small>&lt;10分钟</small></button><button class="amber" data-rate="1">困难<small>10分钟</small></button><button class="blue" data-rate="2">一般<small>1天后</small></button><button class="green" data-rate="3">简单<small>4天后</small></button></div>';return h}
function stats(){var total=DATA.length,h='<div class="h1">统计</div><div class="card panel"><div class="sub">已学习 '+learned()+' / '+total+'；已掌握 '+mastered()+'</div>';for(var i=0;i<LV.length;i++){var l=LV[i],c=countLevel(l),d=learned(l),p=pct(d,c);h+='<div class="field"><label>'+l+'</label><div><div class="bar"><span style="width:'+p+'%"></span></div><div class="meta">'+d+'/'+c+'</div></div></div>'}return h+'</div>'}
function mine(){return '<div class="h1">我的</div><div class="card panel"><b>Lexora 学习者</b><br><br><button class="btn on" data-action="reset">清空学习记录</button></div>'}
function render(){var h=top();if(S.tab==='home')h+=home();else if(S.tab==='decks')h+=decks();else if(S.tab==='learn')h+=learn();else if(S.tab==='stats')h+=stats();else h+=mine();$('app').innerHTML=h;renderBottom();bind();save()}
function renderBottom(){var tabs=[['home','首页','⌂'],['decks','卡片库','▣'],['learn','学习','📖'],['stats','统计','▥'],['mine','我的','♙']],h='';for(var i=0;i<tabs.length;i++)h+='<button data-tab="'+tabs[i][0]+'" class="'+(S.tab===tabs[i][0]?'on':'')+'">'+tabs[i][2]+'<br>'+tabs[i][1]+'</button>';$('bottom').innerHTML=h}
function current(){var a=filtered();return a[S.index]||a[0]}
function stepFor(r,k,i){var g=S.gender[i]||'female';if(k==='de')return {text:r.word,lang:'de-DE',rate:S.rateDe,gender:g};if(k==='spell')return {text:String(r.word||'').split('').join(' '),lang:'de-DE',rate:S.rateSpell,gender:g};if(k==='cn')return {text:r.cn,lang:'zh-CN',rate:S.rateZh,gender:g};if(k==='ex')return {text:r.ex,lang:'de-DE',rate:S.rateDe,gender:g};if(k==='excn')return {text:r.exCn,lang:'zh-CN',rate:S.rateZh,gender:g};return null}
function cardPlan(r){var out=[],x;for(var i=0;i<S.seq.length;i++){x=stepFor(r,S.seq[i],i);if(x&&x.text)out.push(x)}return out}
function pickVoice(lang,gender){if(!voices||!voices.length)return null;var base=String(lang||'').slice(0,2).toLowerCase(),pool=[],i,v,n;for(i=0;i<voices.length;i++){v=voices[i];if(String(v.lang||'').toLowerCase().indexOf(base)===0)pool.push(v)}function hit(v){n=String((v.name||'')+' '+(v.voiceURI||'')).toLowerCase();if(gender==='female')return /female|woman|frau|weiblich|katja|anna|marlene|helena|vicki|amala|xiaoxiao|huihui|tingting|hanhan|yaoyao/.test(n);if(gender==='male')return /male|man|mann|männlich|hans|stefan|thorsten|markus|jonas|yunxi|yunyang/.test(n);return false}for(i=0;i<pool.length;i++)if(hit(pool[i]))return pool[i];return pool[0]||null}
function speakOne(o){return new Promise(function(resolve){if(!o||!o.text){resolve();return}try{if(window.speechSynthesis){var u=new SpeechSynthesisUtterance(o.text);u.lang=o.lang;u.rate=parseFloat(o.rate)||.9;var v=pickVoice(o.lang,o.gender);if(v)u.voice=v;u.onend=resolve;u.onerror=resolve;speechSynthesis.speak(u);return}}catch(e){}setTimeout(resolve,900)})}
function wait(ms){return new Promise(function(r){setTimeout(r,ms)})}
async function playPlan(p,myToken){for(var i=0;i<p.length;i++){if(myToken!==token)return;await speakOne(p[i]);await wait(parseInt(S.gap,10)||450)}}
async function playCurrentOnly(){stopAudio(false);var r=current();if(!r)return;var my=++token;await playPlan(cardPlan(r),my);msg('当前卡片读完')}
async function autoPlay(){var a=filtered();if(!a.length)return;stopAudio(false);playing=true;var my=++token;S.tab='learn';render();msg('自动连播开始');while(playing&&my===token){a=filtered();if(!a.length)break;if(S.index>=a.length)S.index=0;S.face='front';render();var r=a[S.index];await playPlan(cardPlan(r),my);if(!playing||my!==token)break;P[r.id]={seen:true,ease:P[r.id]?P[r.id].ease:2,time:Date.now(),level:r.level,scene:r.scene};S.index=nextIndex(a,1);save();if(!S.random&&S.index===0)break}playing=false;render();msg('自动连播结束')}
function bgPlay(){var a=filtered(),out=[],idx,r,p,i,j,max;if(!a.length)return;max=Math.min(a.length,220);for(i=0;i<max;i++){idx=S.random?Math.floor(Math.random()*a.length):(S.index+i)%a.length;r=a[idx];p=cardPlan(r);for(j=0;j<p.length;j++)out.push(p[j])}try{if(window.NativePlayer&&NativePlayer.playBackgroundSequence){NativePlayer.playBackgroundSequence(JSON.stringify(out));msg('APK 息屏连播已开始');return}}catch(e){}msg('浏览器不能息屏，改为前台自动连播');autoPlay()}
function stopAudio(show){playing=false;token++;try{if(window.speechSynthesis)speechSynthesis.cancel()}catch(e){}try{if(window.NativePlayer)NativePlayer.stop()}catch(e){}if(show!==false)msg('已停止')}
function rateCard(ease){var a=filtered(),r;if(!a.length)return;r=a[S.index];P[r.id]={seen:true,ease:ease,time:Date.now(),level:r.level,scene:r.scene};S.index=nextIndex(a,1);S.face='front';msg('已记录');render()}
function bind(){var app=$('app'),bottom=$('bottom'),q=$('q'),card;app.onclick=function(e){var t=e.target;while(t&&t!==app){if(t.getAttribute('data-level')){S.level=t.getAttribute('data-level');S.scene='';S.index=0;S.face='front';render();return}if(t.getAttribute('data-go')){S.level=t.getAttribute('data-go');S.tab='decks';S.scene='';S.index=0;render();return}if(t.getAttribute('data-scene')){S.scene=dec(t.getAttribute('data-scene'));S.tab='learn';S.index=0;S.face='front';render();return}if(t.getAttribute('data-mode')){S.random=t.getAttribute('data-mode')==='random';S.face='front';if(S.random)S.index=nextIndex(filtered(),1);render();return}if(t.getAttribute('data-audio')){S.audioOpen=!S.audioOpen;render();return}if(t.getAttribute('data-play')){playCurrentOnly();return}if(t.getAttribute('data-auto')){autoPlay();return}if(t.getAttribute('data-bg')){bgPlay();return}if(t.getAttribute('data-stop')){stopAudio(true);return}if(t.getAttribute('data-rate')){rateCard(parseInt(t.getAttribute('data-rate'),10));return}if(t.getAttribute('data-speak')){speakOne({text:t.getAttribute('data-speak'),lang:'de-DE',rate:S.rateDe,gender:'female'});e.stopPropagation();return}if(t.getAttribute('data-flip')){S.face=S.face==='front'?'back':'front';save();var c=$('learnCard');if(c)c.className=S.face==='back'?'learn flip':'learn';return}if(t.getAttribute('data-tab')){S.tab=t.getAttribute('data-tab');if(S.tab==='learn')S.face='front';render();return}if(t.getAttribute('data-action')==='reset'){if(confirm('确定清空学习记录吗？')){P={};save();render()}return}if(t.getAttribute('data-act')==='speak'){playCurrentOnly();return}t=t.parentNode}};bottom.onclick=function(e){var t=e.target;while(t&&t!==bottom){if(t.getAttribute('data-tab')){S.tab=t.getAttribute('data-tab');if(S.tab==='learn')S.face='front';render();return}t=t.parentNode}};if(q)q.oninput=function(){S.query=this.value;render()};var sels=document.querySelectorAll('select[data-seq]'),i;for(i=0;i<sels.length;i++)sels[i].onchange=function(){S.seq[parseInt(this.getAttribute('data-seq'),10)]=this.value;save()};var gs=document.querySelectorAll('select[data-gender]');for(i=0;i<gs.length;i++)gs[i].onchange=function(){S.gender[parseInt(this.getAttribute('data-gender'),10)]=this.value;save()};var ranges=document.querySelectorAll('input[data-speed]');for(i=0;i<ranges.length;i++)ranges[i].oninput=function(){S[this.getAttribute('data-speed')]=parseFloat(this.value);save()};card=$('learnCard');if(card)addSwipe(card)}
function addSwipe(el){var sx=0,sy=0;el.addEventListener('touchstart',function(e){if(e.touches&&e.touches[0]){sx=e.touches[0].clientX;sy=e.touches[0].clientY}},false);el.addEventListener('touchend',function(e){if(!e.changedTouches||!e.changedTouches[0])return;var dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;if(Math.abs(dx)>55&&Math.abs(dx)>Math.abs(dy)){var a=filtered();if(!a.length)return;if(S.random)S.index=nextIndex(a,1);else if(dx<0)S.index=(S.index+1)%a.length;else S.index=(S.index-1+a.length)%a.length;S.face='front';render()}},false)}
loadCards();
})();
