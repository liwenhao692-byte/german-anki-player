<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Lexora 德语 Anki</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;background:#050914;color:#eef4ff;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif}
body{background:radial-gradient(circle at 10% 0%,rgba(35,130,255,.28),transparent 30%),linear-gradient(180deg,#050914,#07101d 60%,#040811)}
button,input{font:inherit}
#app{width:min(100vw,520px);margin:0 auto;padding:20px 16px 104px}
.logo{font-size:36px;font-weight:950;margin:6px 0 12px;background:linear-gradient(90deg,#35a6ff,#9d52ff);-webkit-background-clip:text;background-clip:text;color:transparent}
.h1{font-size:28px;font-weight:950;margin:8px 0}.sub{color:#9aa8c0;font-size:14px;line-height:1.45}
.card{border:1px solid rgba(120,155,230,.2);background:linear-gradient(180deg,rgba(13,27,50,.9),rgba(7,16,31,.92));border-radius:24px;padding:14px;margin:11px 0;box-shadow:0 18px 45px rgba(0,0,0,.25)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:9px 0}.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:11px 0}
button,.btn{border:1px solid rgba(116,146,222,.2);background:rgba(10,21,39,.78);color:#aab8cf;border-radius:17px;padding:11px 6px;font-weight:900}
.on{color:#fff!important;background:linear-gradient(135deg,#137fff,#7e3cff)!important}
.list{display:grid;gap:10px}.scene{display:grid;grid-template-columns:50px 1fr auto;align-items:center;gap:12px;padding:13px;border-radius:22px;border:1px solid rgba(111,146,220,.18);background:rgba(9,20,38,.8)}
.badge{width:50px;height:50px;border-radius:17px;display:grid;place-items:center;font-weight:950;background:linear-gradient(145deg,rgba(43,137,255,.35),rgba(132,71,255,.28));border:1px solid rgba(96,144,255,.28)}
.name{font-size:18px;font-weight:900}.meta{font-size:12px;color:#94a3bc;margin-top:4px}.chev{font-size:28px;color:#70809b}
.search{height:46px;width:100%;border-radius:17px;border:1px solid rgba(95,134,218,.25);background:rgba(8,17,31,.72);color:#fff;padding:0 14px;outline:none;margin:8px 0}
.learn{height:345px;margin:10px 0 12px;position:relative;perspective:1200px}.inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .45s}.learn.back .inner{transform:rotateY(180deg)}
.face{position:absolute;inset:0;border-radius:26px;border:1.5px solid rgba(58,143,255,.62);background:linear-gradient(180deg,rgba(12,24,44,.96),rgba(7,14,27,.98));padding:17px;backface-visibility:hidden;overflow:hidden}.face.b{transform:rotateY(180deg);overflow:auto}
.lh{display:flex;align-items:center;justify-content:space-between;color:#9aa7bd;font-size:13px;margin-bottom:8px}.tag{padding:6px 10px;border-radius:999px;background:rgba(80,83,255,.14);color:#70a9ff;font-weight:800}
.word{text-align:center;font-family:Georgia,"Times New Roman",serif;font-size:39px;font-weight:900;margin:42px 0 12px;word-break:break-word}.word2{text-align:center;font-family:Georgia,"Times New Roman",serif;font-size:28px;font-weight:900;margin:8px 0}
.pos{text-align:center;color:#7aa8ff;font-size:17px}.hint{text-align:center;color:#9aa7bd;margin-top:38px;line-height:1.5}.cn{text-align:center;font-size:27px;font-weight:950;line-height:1.28}
.info{border:1px solid rgba(134,158,218,.16);background:rgba(4,12,24,.42);border-radius:16px;padding:10px;margin-top:9px;line-height:1.43;color:#dbe5f7}.info b{display:block;font-size:13px;color:#5aa7ff;margin-bottom:4px}
.ans{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.ans button{min-height:64px}.red{color:#ff626e}.amber{color:#ff9b22}.blue{color:#55a5ff}.green{color:#2bdf9a}
.field{display:grid;grid-template-columns:92px 1fr;gap:9px;align-items:center;margin:10px 0}.field label{font-size:13px;color:#9ba8c1}.field input{width:100%;height:40px;border-radius:14px;border:1px solid rgba(95,134,218,.24);background:#0b1628;color:#fff;padding:0 10px}
.bottom{position:fixed;left:50%;bottom:10px;transform:translateX(-50%);width:min(calc(100vw - 28px),500px);height:72px;border-radius:27px;border:1px solid rgba(128,153,210,.18);background:rgba(8,17,31,.9);display:grid;grid-template-columns:repeat(5,1fr);gap:2px;padding:7px;z-index:10}.bottom button{border:0;background:transparent;color:#8b98ae;border-radius:20px;font-weight:850;padding:4px}.bottom button.on{color:#54a7ff;background:rgba(61,112,255,.13)!important}
.toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%);opacity:0;transition:.2s;background:#18243c;border:1px solid rgba(118,146,218,.24);border-radius:999px;padding:10px 15px;font-weight:850;z-index:30}.toast.show{opacity:1}
@media(max-height:740px){.learn{height:325px}.word{margin-top:30px;font-size:36px}.ans button{min-height:58px}}
</style>
</head>
<body>
<div id="app"><div class="logo">Lexora</div><div class="card">正在加载词表……</div></div>
<div id="bottom" class="bottom"></div><div id="toast" class="toast"></div>
<script>
(function(){
var DATA=[],S={},P={},cache={},audio=null,playing=false,token=0;
var LS='lexora_real_audio_number_v2',LP='lexora_real_audio_progress_v2';
var LV=['A1','A2','B1'];
function $(id){return document.getElementById(id)}
function esc(s){return String(s||'').replace(/[&<>"]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]})}
function enc(s){return encodeURIComponent(String(s||''))}
function dec(s){try{return decodeURIComponent(s||'')}catch(e){return s||''}}
function save(){try{localStorage.setItem(LS,JSON.stringify(S));localStorage.setItem(LP,JSON.stringify(P))}catch(e){}}
function load(k,d){try{return JSON.parse(localStorage.getItem(k)||'')||d}catch(e){return d}}
function msg(s){var t=$('toast');t.innerHTML=esc(s);t.className='toast show';clearTimeout(msg.t);msg.t=setTimeout(function(){t.className='toast'},1300)}
function parse(t){var lines=t.replace(/\r/g,'').split('\n'),out=[],i,p;for(i=0;i<lines.length;i++){if(!lines[i])continue;p=lines[i].split('\t');out.push({id:p[0]||String(i+1),level:p[1]||'',sceneNo:p[2]||'',scene:p[3]||'',word:p[4]||'',pos:p[5]||'',cn:p[6]||'',ex:p[7]||'',exCn:p[8]||'',tags:p[11]||''})}return out}
function init(){S=load(LS,{tab:'home',level:'A1',scene:'',index:0,back:false,random:false,query:'',audioOpen:true,speed:1,repeat:1,gap:450});P=load(LP,{});render()}
function loadCards(){var x=new XMLHttpRequest();x.open('GET','cards.tsv',true);x.onreadystatechange=function(){if(x.readyState===4){if(x.status===200||x.status===0){DATA=parse(x.responseText);init()}else fail(x.status)}};try{x.send()}catch(e){fail('blocked')}}
function fail(c){$('app').innerHTML='<div class="logo">Lexora</div><div class="card"><div class="h1">词表加载失败</div><div class="sub">错误：'+esc(c)+'</div></div>'}
function arr(){var q=(S.query||'').toLowerCase(),a=[],r,t,i;for(i=0;i<DATA.length;i++){r=DATA[i];if(r.level!==S.level)continue;if(S.scene&&r.scene!==S.scene)continue;if(q){t=(r.word+' '+r.cn+' '+r.pos+' '+r.scene+' '+r.tags).toLowerCase();if(t.indexOf(q)<0)continue}a.push(r)}return a}
function cnt(l){var n=0;for(var i=0;i<DATA.length;i++)if(DATA[i].level===l)n++;return n}
function done(l,s){var n=0,r;for(var i=0;i<DATA.length;i++){r=DATA[i];if(l&&r.level!==l)continue;if(s&&r.scene!==s)continue;if(P[r.id])n++}return n}
function scenes(l){var m={},a=[],r,k;for(var i=0;i<DATA.length;i++){r=DATA[i];if(r.level!==l)continue;k=r.scene;if(!m[k])m[k]={name:k,no:r.sceneNo,count:0,done:0};m[k].count++;if(P[r.id])m[k].done++}for(k in m)a.push(m[k]);a.sort(function(x,y){return (x.no||'').localeCompare(y.no||'')});return a}
function next(a){if(!a.length)return 0;if(S.random&&a.length>1){var n=S.index,z=0;while(z<30&&n===S.index){n=Math.floor(Math.random()*a.length);z++}return n}return (S.index+1)%a.length}
function levels(){var h='<div class="row3">';for(var i=0;i<LV.length;i++){var l=LV[i];h+='<button data-level="'+l+'" class="'+(S.level===l?'on':'')+'">'+l+'<br><span style="font-size:11px;opacity:.75">'+cnt(l)+' 张</span></button>'}return h+'</div>'}
function home(){var h='<div class="logo">Lexora</div><div class="h1">德语 B1 目标词表</div><div class="sub">只播放真人/词典音频。中文、拼读、例句不会被机器朗读。</div>'+levels()+'<div class="list">';for(var i=0;i<LV.length;i++){var l=LV[i],c=cnt(l),d=done(l);h+='<div class="scene" data-go="'+l+'"><div class="badge">'+l+'</div><div><div class="name">'+(l==='A1'?'基础生存沟通':l==='A2'?'日常办事与租房':'观点表达与工作实习')+'</div><div class="meta">'+c+' 张 · 已学 '+d+'</div></div><div class="chev">›</div></div>'}return h+'</div>'}
function decks(){var a=scenes(S.level),h='<div class="logo">Lexora</div><div class="h1">卡片库</div>'+levels()+'<input id="q" class="search" value="'+esc(S.query)+'" placeholder="搜索德语 / 中文 / 场景"><div class="list">';for(var i=0;i<a.length;i++){var s=a[i];h+='<div class="scene" data-scene="'+enc(s.name)+'"><div class="badge">'+esc(s.no||S.level)+'</div><div><div class="name">'+esc(s.name)+'</div><div class="meta">'+s.count+' 张 · 已学 '+s.done+'</div></div><div class="chev">›</div></div>'}return h+'</div>'}
function panel(){return '<div class="card"><div class="row2"><button class="btn on" data-auto="1">自动连播</button><button class="btn" data-stop="1">停止</button></div><div class="row2"><button class="btn" data-play="1">只读当前</button><button class="btn" data-audio="1">收起设置</button></div><div class="field"><label>速度</label><input data-speed="1" type="number" min="0.5" max="1.6" step="0.05" value="'+S.speed+'"></div><div class="field"><label>读几次</label><input data-repeat="1" type="number" min="1" max="50" step="1" value="'+S.repeat+'"></div><div class="field"><label>间隔毫秒</label><input data-gap="1" type="number" min="0" max="5000" step="50" value="'+S.gap+'"></div><div class="sub">全部是数字输入。速度 1 是原速，0.8 更慢，1.2 更快。</div></div>'}
function learn(){var a=arr();if(S.index>=a.length)S.index=0;var r=a[S.index],h='<div class="logo">Lexora</div><div class="h1">学习</div><div class="sub">'+esc(S.level)+(S.scene?' · '+esc(S.scene):'')+(playing?' · 连播中':'')+'</div>'+levels();if(!S.scene)return h+'<div class="card">先到卡片库选一个具体场景。</div>';h+='<div class="row2"><button class="btn '+(!S.random?'on':'')+'" data-mode="order">顺序出卡</button><button class="btn '+(S.random?'on':'')+'" data-mode="random">随机出卡</button></div><div class="row2"><button class="btn on" data-auto="1">自动连播</button><button class="btn" data-audio="1">数字设置</button></div>';if(S.audioOpen)h+=panel();if(!r)return h+'<div class="card">没有卡片。</div>';h+='<div id="learnCard" class="learn '+(S.back?'back':'')+'" data-flip="1"><div class="inner"><div class="face"><div class="lh"><span>'+(S.index+1)+' / '+a.length+'</span><span class="tag">'+esc(r.level)+' · '+esc(r.scene)+'</span><span data-sound="'+esc(r.word)+'">🔊</span></div><div class="word">'+esc(r.word)+'</div><div class="pos">'+esc(r.pos)+'</div><div class="hint">真人/词典音频<br>速度、次数、间隔都是数字</div></div><div class="face b"><div class="lh"><span>'+(S.index+1)+' / '+a.length+'</span><span class="tag">'+esc(r.level)+' · '+esc(r.scene)+'</span></div><div class="word2">'+esc(r.word)+'</div><div class="cn">'+esc(r.cn)+'</div><div class="pos">'+esc(r.pos)+'</div>';if(r.ex)h+='<div class="info"><b>例句</b>'+esc(r.ex)+'<br>'+esc(r.exCn)+'</div>';h+='</div></div></div><div class="ans"><button class="red" data-rate="0">忘记<small>&lt;10分钟</small></button><button class="amber" data-rate="1">困难<small>10分钟</small></button><button class="blue" data-rate="2">一般<small>1天后</small></button><button class="green" data-rate="3">简单<small>4天后</small></button></div>';return h}
function stats(){return '<div class="logo">Lexora</div><div class="h1">统计</div><div class="card"><div class="sub">已学习 '+done()+' / '+DATA.length+'</div></div>'}
function mine(){return '<div class="logo">Lexora</div><div class="h1">我的</div><div class="card"><button class="btn on" data-reset="1">清空学习记录</button></div>'}
function render(){var h=S.tab==='home'?home():S.tab==='decks'?decks():S.tab==='learn'?learn():S.tab==='stats'?stats():mine();$('app').innerHTML=h;nav();bind();save()}
function nav(){var t=[['home','首页','⌂'],['decks','卡片库','▣'],['learn','学习','📖'],['stats','统计','▥'],['mine','我的','♙']],h='';for(var i=0;i<t.length;i++)h+='<button data-tab="'+t[i][0]+'" class="'+(S.tab===t[i][0]?'on':'')+'">'+t[i][2]+'<br>'+t[i][1]+'</button>';$('bottom').innerHTML=h}
function clean(w){return String(w||'').trim().replace(/\(.*?\)/g,'').replace(/^(der|die|das|ein|eine|einen|einem|einer)\s+/i,'').replace(/\s.*$/,'')}
function xhr(url,cb){var x=new XMLHttpRequest();x.open('GET',url,true);x.onreadystatechange=function(){if(x.readyState===4){if(x.status===200)cb(null,x.responseText);else cb(x.status)}};try{x.send()}catch(e){cb(e)}}
function findAudio(word,cb){var w=clean(word);if(!w){cb('');return}if(cache[w]!==undefined){cb(cache[w]);return}var cap=w.charAt(0).toUpperCase()+w.slice(1),low=w.charAt(0).toLowerCase()+w.slice(1);var titles=['File:De-'+w+'.ogg','File:De-'+cap+'.ogg','File:De-'+low+'.ogg','File:De-'+w+'.oga','File:De-'+cap+'.oga','File:De-'+w+'.mp3','File:De-'+cap+'.mp3'];var api='https://commons.wikimedia.org/w/api.php?action=query&origin=*&format=json&prop=imageinfo&iiprop=url&titles='+encodeURIComponent(titles.join('|'));xhr(api,function(err,text){var k,p,pages,j;if(!err){try{j=JSON.parse(text);pages=(j.query&&j.query.pages)||{};for(k in pages){p=pages[k];if(p.imageinfo&&p.imageinfo[0]&&p.imageinfo[0].url){cache[w]=p.imageinfo[0].url;cb(cache[w]);return}}}catch(e){}}cache[w]='';cb('')})}
function playOnce(url,cb){try{if(audio){audio.pause();audio=null}audio=new Audio(url);audio.playbackRate=parseFloat(S.speed)||1;audio.onended=function(){cb(true)};audio.onerror=function(){cb(false)};audio.play().catch(function(){cb(false)})}catch(e){cb(false)}}
function playWord(word,show,donecb){findAudio(word,function(url){if(!url){if(show)msg('这个词没有真人音频');donecb&&donecb(false);return}var left=Math.max(1,parseInt(S.repeat,10)||1);function one(){if(left<=0){donecb&&donecb(true);return}left--;playOnce(url,function(){setTimeout(one,Math.max(0,parseInt(S.gap,10)||0))})}one()})}
function playCurrent(){stop(false);var r=arr()[S.index];if(!r)return;var my=++token;playWord(r.word,true,function(ok){if(my===token&&ok)msg('播放完成')})}
function auto(){var a=arr();if(!a.length)return;stop(false);playing=true;var my=++token;S.tab='learn';render();msg('自动连播开始');function loop(){if(!playing||my!==token)return;a=arr();if(!a.length){stop(false);render();return}if(S.index>=a.length)S.index=0;S.back=false;render();var r=a[S.index];playWord(r.word,false,function(){if(!playing||my!==token)return;P[r.id]={time:Date.now(),ease:2};S.index=next(a);save();if(!S.random&&S.index===0){playing=false;render();msg('自动连播结束');return}setTimeout(loop,Math.max(0,parseInt(S.gap,10)||0))})}loop()}
function stop(show){playing=false;token++;try{if(audio){audio.pause();audio=null}}catch(e){}if(show!==false)msg('已停止')}
function rate(e){var a=arr(),r;if(!a.length)return;r=a[S.index];P[r.id]={time:Date.now(),ease:e};S.index=next(a);S.back=false;render()}
function clampNum(v,min,max,def){v=parseFloat(v);if(isNaN(v))v=def;if(v<min)v=min;if(v>max)v=max;return v}
function bind(){var app=$('app'),bot=$('bottom'),q=$('q'),i,els;app.onclick=function(e){var t=e.target;while(t&&t!==app){if(t.dataset.level){S.level=t.dataset.level;S.scene='';S.index=0;render();return}if(t.dataset.go){S.level=t.dataset.go;S.tab='decks';S.scene='';S.index=0;render();return}if(t.dataset.scene){S.scene=dec(t.dataset.scene);S.tab='learn';S.index=0;S.back=false;render();return}if(t.dataset.mode){S.random=t.dataset.mode==='random';render();return}if(t.dataset.audio){S.audioOpen=!S.audioOpen;render();return}if(t.dataset.play){playCurrent();return}if(t.dataset.auto){auto();return}if(t.dataset.stop){stop(true);return}if(t.dataset.rate){rate(parseInt(t.dataset.rate,10));return}if(t.dataset.sound){playWord(t.dataset.sound,true,function(){});return}if(t.dataset.flip){S.back=!S.back;render();return}if(t.dataset.reset){if(confirm('确定清空学习记录吗？')){P={};render()}return}t=t.parentNode}};bot.onclick=function(e){var t=e.target;while(t&&t!==bot){if(t.dataset.tab){S.tab=t.dataset.tab;render();return}t=t.parentNode}};if(q)q.oninput=function(){S.query=this.value;render()};els=document.querySelectorAll('input[data-speed]');for(i=0;i<els.length;i++)els[i].onchange=function(){S.speed=clampNum(this.value,.5,1.6,1);save();render()};els=document.querySelectorAll('input[data-repeat]');for(i=0;i<els.length;i++)els[i].onchange=function(){S.repeat=Math.round(clampNum(this.value,1,50,1));save();render()};els=document.querySelectorAll('input[data-gap]');for(i=0;i<els.length;i++)els[i].onchange=function(){S.gap=Math.round(clampNum(this.value,0,5000,450));save();render()}}
loadCards();
})();
</script>
</body>
</html>
