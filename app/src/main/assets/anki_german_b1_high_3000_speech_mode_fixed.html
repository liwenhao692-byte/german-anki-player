  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      width: 100%; height: 100%; overflow: hidden; overscroll-behavior: none;
      background: #100d0a; color: #fff4e3;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
      -webkit-text-size-adjust: 100%; touch-action: none;
    }
    body { width: 100vw; height: 100dvh; min-height: 100dvh; position: fixed; inset: 0; }
    button, input, select { font: inherit; }
    button { border: 0; cursor: pointer; user-select: none; color: inherit; }
    .app {
      width: 100vw; height: 100dvh; min-width: 100vw; min-height: 100dvh; overflow: hidden; position: relative;
      display: grid;
      grid-template-rows:
        clamp(46px, 6.6dvh, 72px)
        clamp(34px, 4.9dvh, 50px)
        clamp(32px, 4.2dvh, 46px)
        clamp(32px, 4.2dvh, 46px)
        clamp(32px, 4.2dvh, 46px)
        minmax(0, 1fr)
        clamp(40px, 5.4dvh, 58px)
        clamp(112px, 16.6dvh, 164px);
      gap: clamp(4px, .72dvh, 8px);
      padding: max(6px, env(safe-area-inset-top)) clamp(8px, 2.4vw, 18px) max(6px, env(safe-area-inset-bottom));
      background:
        radial-gradient(circle at 12% 0%, rgba(92, 76, 255, .38), transparent 32%),
        radial-gradient(circle at 96% 15%, rgba(255, 188, 91, .28), transparent 34%),
        radial-gradient(circle at 70% 110%, rgba(57, 192, 150, .20), transparent 36%),
        linear-gradient(150deg, #15100c 0%, #2a2118 52%, #120f0b 100%);
    }
    .app::before { content:""; position:absolute; inset:0; pointer-events:none; background: linear-gradient(180deg, rgba(255,255,255,.08), transparent 19%, rgba(0,0,0,.16)); }
    .top { position: relative; z-index: 2; min-height: 0; display:grid; grid-template-columns: 1fr auto; align-items:center; gap: clamp(8px, 2.8vw, 14px); }
    .title { min-width: 0; }
    .title h1 { font-size: clamp(23px, 7.4vw, 45px); line-height: .94; letter-spacing: -.08em; font-weight: 930; color:#fff7e8; white-space:nowrap; text-shadow:0 12px 32px rgba(0,0,0,.28); }
    .title p { margin-top: clamp(1px, .35dvh, 5px); font-size: clamp(10px, 3.05vw, 17px); line-height:1.1; color:rgba(255,244,224,.62); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .counter { min-width: clamp(70px, 20vw, 124px); height: clamp(38px, 5.6dvh, 60px); padding:0 clamp(11px, 3.3vw, 20px); display:grid; place-items:center; border-radius:999px; background:rgba(15,12,9,.78); color:#fff1dc; font-size:clamp(15px,4.4vw,26px); font-weight:900; letter-spacing:-.04em; box-shadow:inset 0 0 0 1px rgba(255,255,255,.08),0 14px 34px rgba(0,0,0,.22); white-space:nowrap; }
    .searchBox { position:relative; z-index:3; min-height:0; display:grid; grid-template-columns: 1fr clamp(98px, 25vw, 160px); gap: clamp(6px, 1.6vw, 12px); }
    .searchBox input, .searchBox select { width:100%; height:100%; border:1px solid rgba(255,255,255,.1); outline:none; border-radius:999px; background:rgba(16,13,10,.74); color:#fff7e7; padding:0 clamp(12px,3.7vw,22px); font-size:clamp(13px,3.75vw,21px); font-weight:760; box-shadow:0 14px 32px rgba(0,0,0,.22); touch-action:manipulation; }
    .searchBox input::placeholder { color:rgba(255,245,229,.45); }
    .strip { position:relative; z-index:2; min-height:0; display:flex; align-items:center; gap:clamp(6px,1.8vw,11px); overflow-x:auto; overflow-y:hidden; scrollbar-width:none; -webkit-overflow-scrolling:touch; touch-action:pan-x; padding:0 1px; }
    .strip::-webkit-scrollbar { display:none; }
    .pill { height:100%; flex:0 0 auto; border-radius:999px; padding:0 clamp(11px,3.35vw,22px); background:rgba(255,246,230,.13); color:rgba(255,247,233,.74); border:1px solid rgba(255,255,255,.08); font-size:clamp(12px,3.55vw,21px); font-weight:870; letter-spacing:-.045em; white-space:nowrap; box-shadow:0 10px 24px rgba(0,0,0,.16); touch-action:manipulation; }
    .pill.active { background:rgba(255,239,207,.94); color:#251a11; }
    .pill.green.active { background:rgba(37,116,87,.92); color:#fff7e7; }
    .pill.red.active { background:rgba(111,34,39,.94); color:#fff7e7; }
    .pill.star.active { background:rgba(183,123,22,.94); color:#fff7e7; }
    .stage { min-height:0; position:relative; z-index:1; perspective:1500px; overflow:hidden; }
    .card { width:100%; height:100%; position:relative; transform-style:preserve-3d; transition: transform .32s cubic-bezier(.2,.75,.2,1); outline:none; cursor:pointer; border-radius:clamp(23px,6.5vw,46px); touch-action:none; }
    .card.flipped { transform:rotateY(180deg); }
    .card.bumpNext { animation:bumpNext .22s ease; }
    .card.bumpPrev { animation:bumpPrev .22s ease; }
    @keyframes bumpNext { 0%{ transform:translateX(13px) scale(.985);} 100%{ transform:translateX(0) scale(1);} }
    @keyframes bumpPrev { 0%{ transform:translateX(-13px) scale(.985);} 100%{ transform:translateX(0) scale(1);} }
    .face { position:absolute; inset:0; backface-visibility:hidden; overflow:hidden; border-radius:inherit; display:grid; grid-template-rows:auto minmax(0,1fr) auto; padding:clamp(14px,4.3vw,32px); background:radial-gradient(circle at 50% 42%, rgba(255,255,255,.07), transparent 40%), linear-gradient(180deg, rgba(17,15,12,.95), rgba(22,19,15,.90)); border:1px solid rgba(255,255,255,.09); box-shadow:inset 0 1px 0 rgba(255,255,255,.07),0 22px 52px rgba(0,0,0,.34); }
    .back { transform:rotateY(180deg); }
    .cardMeta { display:flex; justify-content:space-between; gap:10px; color:rgba(255,244,224,.52); font-size:clamp(11px,3.15vw,19px); font-weight:800; min-width:0; }
    .cardMeta span:first-child { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .cardMeta .mark { color:#ffca65; margin-left:6px; }
    .frontCore, .backCore { min-height:0; width:100%; display:grid; place-items:center; align-content:center; text-align:center; gap:clamp(11px,2dvh,22px); overflow:hidden; }
    .word { width:100%; color:#fff7e7; font-size:clamp(38px,12.8vw,100px); line-height:1.04; letter-spacing:-.075em; font-weight:930; overflow-wrap:anywhere; text-wrap:balance; text-shadow:0 14px 38px rgba(0,0,0,.35); max-height:3.2em; overflow:hidden; }
    .hint { max-width:100%; border-radius:999px; background:rgba(255,255,255,.08); color:rgba(255,246,229,.58); padding:clamp(5px,1.1dvh,10px) clamp(11px,3.3vw,21px); font-size:clamp(11px,3.25vw,19px); font-weight:790; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .meaning { width:100%; min-width:0; display:grid; gap:clamp(4px,.8dvh,8px); }
    .meaning .label { font-size:clamp(12px,3.55vw,21px); color:rgba(255,244,224,.56); font-weight:850; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .meaning .cn { color:#fff7e7; font-size:clamp(30px,9.5vw,76px); line-height:1.08; letter-spacing:-.07em; font-weight:930; overflow-wrap:anywhere; text-wrap:balance; max-height:3.25em; overflow:hidden; text-shadow:0 14px 38px rgba(0,0,0,.34); }
    .infoGrid { width:100%; display:grid; gap:clamp(4px,.8dvh,9px); }
    .infoRow { display:grid; grid-template-columns:clamp(38px,10.8vw,66px) 1fr; align-items:start; gap:clamp(6px,1.8vw,12px); min-height:0; padding:clamp(6px,1.05dvh,12px) clamp(9px,2.6vw,18px); border-radius:clamp(12px,3.8vw,24px); background:rgba(255,255,255,.08); color:rgba(255,247,232,.86); font-size:clamp(12px,3.45vw,20px); line-height:1.23; text-align:left; }
    .infoRow b { color:rgba(255,244,224,.46); font-weight:890; }
    .infoRow span { min-width:0; overflow:hidden; display:-webkit-box; -webkit-box-orient:vertical; -webkit-line-clamp:2; }
    .exampleBox { display:none; width:100%; border-radius:clamp(12px,3.8vw,24px); padding:clamp(7px,1.1dvh,12px) clamp(10px,2.9vw,18px); background:rgba(255,221,151,.12); color:rgba(255,246,228,.88); font-size:clamp(12px,3.45vw,20px); line-height:1.25; text-align:left; font-weight:760; overflow:hidden; display:none; -webkit-box-orient:vertical; -webkit-line-clamp:2; }
    .exampleBox.show { display:-webkit-box; }
    .cardFooter { display:flex; justify-content:center; min-width:0; color:rgba(255,244,224,.48); font-size:clamp(11px,3.2vw,19px); font-weight:770; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .nav { position:relative; z-index:2; min-height:0; display:grid; grid-template-columns:1fr 1.05fr 1fr; gap:clamp(6px,2vw,14px); }
    .nav button { min-width:0; height:100%; border-radius:clamp(15px,4.6vw,28px); background:rgba(255,246,230,.15); color:#fff5e2; border:1px solid rgba(255,255,255,.08); font-size:clamp(14px,4.45vw,26px); font-weight:900; letter-spacing:-.06em; box-shadow:0 12px 25px rgba(0,0,0,.18); touch-action:manipulation; }
    .nav .mainAction { background:rgba(255,239,207,.94); color:#251a11; }
    .practice { position:relative; z-index:2; min-height:0; overflow:hidden; }
    .rates, .options, .typePanel { width:100%; height:100%; min-height:0; }
    .rates { display:grid; grid-template-columns:repeat(4,1fr); grid-template-rows:1fr 1fr; gap:clamp(6px,.9dvh,9px) clamp(7px,2vw,14px); }
    .statusBtn { grid-row:1; }
    .rate { grid-row:2; }
    .options { display:none; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; gap:clamp(7px,1dvh,10px) clamp(9px,2.4vw,17px); }
    .typePanel { display:none; grid-template-rows:1fr 1fr; gap:clamp(7px,1dvh,10px); }
    .typeRow { display:grid; grid-template-columns:1fr clamp(78px,22vw,132px); gap:clamp(7px,2vw,14px); }
    .typePanel input { min-width:0; height:100%; border-radius:clamp(15px,4.6vw,28px); border:1px solid rgba(255,255,255,.1); outline:none; background:rgba(255,246,230,.13); color:#fff7e7; padding:0 clamp(12px,3.4vw,22px); font-size:clamp(15px,4.4vw,25px); font-weight:790; touch-action:manipulation; }
    .typePanel button { height:100%; border-radius:clamp(15px,4.6vw,28px); background:rgba(255,239,207,.94); color:#251a11; font-size:clamp(14px,4.1vw,23px); font-weight:910; letter-spacing:-.055em; touch-action:manipulation; }
    .typeResult { min-height:0; border-radius:clamp(15px,4.6vw,28px); background:rgba(255,246,230,.10); color:rgba(255,247,233,.82); display:grid; place-items:center; text-align:center; padding:0 12px; font-size:clamp(13px,3.8vw,21px); line-height:1.15; font-weight:800; overflow:hidden; }
    .practice.quiz .rates, .practice.type .rates { display:none; }
    .practice.quiz .options { display:grid; }
    .practice.type .typePanel { display:grid; }
    .statusBtn, .rate, .choice { min-height:0; border-radius:clamp(15px,4.4vw,28px); display:grid; place-items:center; align-content:center; color:#fff7e7; border:1px solid rgba(255,255,255,.08); box-shadow:0 12px 25px rgba(0,0,0,.16); touch-action:manipulation; padding:0 clamp(2px,1vw,8px); }
    .statusBtn { font-size:clamp(14px,4vw,23px); font-weight:920; letter-spacing:-.06em; background:rgba(255,246,230,.12); }

    .statusBtn.fuzzy { background:rgba(87,57,18,.84); }
    .statusBtn.unknown { background:rgba(91,24,27,.84); }
    .statusBtn.active { outline:2px solid rgba(255,239,207,.95); }
    .rate strong { font-size:clamp(13px,3.8vw,23px); line-height:1; letter-spacing:-.06em; }
    .rate span { font-size:clamp(9px,2.6vw,15px); line-height:1.05; color:rgba(255,246,230,.55); font-weight:820; }
    .rate.again { background:rgba(91,24,27,.70); }
    .rate.hard { background:rgba(87,57,18,.74); }
    .rate.good { background:rgba(20,78,57,.76); }
    .rate.easy { background:rgba(31,58,112,.76); }
    .choice { background:rgba(255,246,230,.13); color:rgba(255,247,233,.92); padding:clamp(7px,2vw,12px); font-size:clamp(14px,4.15vw,25px); font-weight:880; line-height:1.12; letter-spacing:-.045em; text-align:center; overflow:hidden; }
    .choice span { display:-webkit-box; -webkit-box-orient:vertical; -webkit-line-clamp:2; overflow:hidden; overflow-wrap:anywhere; }
    .choice.correct { background:rgba(22,100,68,.92); color:#fff7e7; }
    .choice.wrong { background:rgba(115,34,38,.94); color:#fff7e7; }
    .choice.dim { opacity:.58; }
    .modal { position:absolute; z-index:20; inset:0; display:none; place-items:center; background:rgba(0,0,0,.48); padding:clamp(16px,5vw,30px); }
    .modal.show { display:grid; }
    .modalCard { width:min(92vw,520px); border-radius:28px; background:rgba(20,17,13,.96); border:1px solid rgba(255,255,255,.1); box-shadow:0 30px 80px rgba(0,0,0,.45); padding:20px; display:grid; gap:13px; }
    .modalCard h2 { font-size:28px; letter-spacing:-.06em; }
    .statGrid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .statBox { border-radius:18px; padding:13px; background:rgba(255,255,255,.08); }

    .modalBtns { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .modalBtns button { height:44px; border-radius:999px; background:rgba(255,239,207,.94); color:#251a11; font-weight:900; }

    @media (max-height: 760px) {
      .app { grid-template-rows:44px 32px 30px 30px 30px minmax(0,1fr) 38px 104px; gap:3px; padding:6px 8px; }

      .face { padding:12px; }
      .word { font-size:clamp(34px,12vw,82px); }

  <main class="app" id="app" aria-label="德语B1高段 Anki 手机满屏增强版">
    <section class="top">
      <div class="title">
        <h1>德语B1高段</h1>
        <p id="subtitle">15 章 · 3000 张 · 增强复习</p>
      </div>
      <div class="counter" id="counter">1 / 3000</div>
    </section>

    <section class="searchBox">
      <input id="search" type="search" placeholder="搜索德语、中文、分类、序号" autocomplete="off" />
      <select id="posSelect" aria-label="类型筛选"><option value="all">全部类型</option></select>
    </section>

    <nav class="strip" id="deckStrip" aria-label="章节选择"></nav>

    <section class="strip" id="modeStrip" aria-label="学习模式">
      <button class="pill active" type="button" data-mode="flip">翻卡</button>
      <button class="pill" type="button" data-mode="quiz">猜意思</button>
      <button class="pill" type="button" data-mode="type">打字</button>
      <button class="pill green" id="reverseBtn" type="button">反向</button>
      <button class="pill green" id="autoNextBtn" type="button">自动</button>
      <button class="pill green" id="randomBtn" type="button">随机</button>
    </section>

    <section class="strip" id="filterStrip" aria-label="复习筛选和工具">
      <button class="pill active" type="button" data-filter="all">全部</button>
      <button class="pill red" type="button" data-filter="focus">重点</button>
      <button class="pill red" type="button" data-filter="wrong">错题</button>
      <button class="pill star" type="button" data-filter="favorite">星标</button>
      <button class="pill star" id="favoriteBtn" type="button">☆ 星标</button>
      <button class="pill" id="exampleBtn" type="button">例句</button>
      <button class="pill" id="speakBtn" type="button">🔊 发音</button>
      <button class="pill green" id="autoSpeakBtn" type="button">自动读</button>
      <button class="pill" id="speechModeBtn" type="button">朗读模式</button>
      <button class="pill" id="distinguishBtn" type="button">辨析</button>
      <button class="pill" id="statsBtn" type="button">统计</button>
    </section>

    <section class="stage">
      <article class="card" id="card" tabindex="0" role="button" aria-label="点击翻面或显示答案">
        <section class="face front">
          <div class="cardMeta"><span id="frontDeck">核心动词与基础搭配</span><span id="frontIndex">序号 1</span></div>
          <div class="frontCore">
            <div class="word" id="frontWord">machen</div>
            <div class="hint" id="frontHint">点击卡片显示答案</div>
          </div>
          <div class="cardFooter" id="frontFooter">空格翻面 · 左右换卡</div>
        </section>
        <section class="face back">
          <div class="cardMeta"><span id="backDeck">核心动词与基础搭配</span><span id="backIndex">序号 1</span></div>
          <div class="backCore">
            <div class="meaning">
              <div class="label" id="answerWord">machen</div>
              <div class="cn" id="meaning">做；进行</div>
            </div>
            <div class="infoGrid">
              <div class="infoRow"><b>类型</b><span id="pos">输入词条</span></div>
              <div class="infoRow"><b>目标</b><span id="gender">输入</span></div>
              <div class="infoRow"><b>分类</b><span id="scene">01 核心动词与基础搭配</span></div>
            </div>
            <div class="exampleBox" id="exampleBox">例句</div>
          </div>
          <div class="cardFooter" id="backFooter">再点一次回到正面</div>
        </section>
      </article>
    </section>

    <section class="nav">
      <button id="prevBtn" type="button">上一张</button>
      <button id="actionBtn" class="mainAction" type="button">翻面</button>
      <button id="nextBtn" type="button">下一张</button>
    </section>

    <section class="practice" id="practice">
      <div class="rates" id="rates">
        <button class="statusBtn known" type="button" data-status="known">认识</button>
        <button class="statusBtn fuzzy" type="button" data-status="fuzzy">模糊</button>
        <button class="statusBtn unknown" type="button" data-status="unknown">不认识</button>
        <button class="statusBtn" type="button" id="clearStatusBtn">清状态</button>
        <button class="rate again" type="button" data-score="again"><strong>忘记</strong><span>1</span></button>
        <button class="rate hard" type="button" data-score="hard"><strong>困难</strong><span>2</span></button>
        <button class="rate good" type="button" data-score="good"><strong>记得</strong><span>3</span></button>
        <button class="rate easy" type="button" data-score="easy"><strong>熟练</strong><span>4</span></button>
      </div>
      <div class="options" id="options" aria-label="四个选项">
        <button class="choice" type="button" data-option="0"><span>选项一</span></button>
        <button class="choice" type="button" data-option="1"><span>选项二</span></button>
        <button class="choice" type="button" data-option="2"><span>选项三</span></button>
        <button class="choice" type="button" data-option="3"><span>选项四</span></button>
      </div>
      <div class="typePanel" id="typePanel">
        <div class="typeRow">
          <input id="typeInput" type="text" placeholder="输入答案" autocomplete="off" />
          <button id="checkTypeBtn" type="button">检查</button>
        </div>
        <div class="typeResult" id="typeResult">中文→德语时更适合练输出</div>
      </div>
    </section>


    <section class="modal" id="speechModal" aria-label="朗读模式">
      <div class="modalCard speechCard">
        <h2>朗读模式</h2>
        <div class="speechBody">
          <div class="speechLine">
            <label>德语读几遍</label>
            <select id="speechDeCount">
              <option value="1">1 遍</option>
              <option value="2" selected>2 遍</option>
              <option value="3">3 遍</option>
              <option value="4">4 遍</option>
              <option value="5">5 遍</option>
            </select>
          </div>
          <div class="speechLine">
            <label>中文读几遍</label>
            <select id="speechZhCount">
              <option value="0">不读中文</option>
              <option value="1" selected>1 遍</option>
              <option value="2">2 遍</option>
              <option value="3">3 遍</option>
            </select>
          </div>
          <div class="speechLine">
            <label>播放速度 <span id="speechSpeedValue">0.90x</span></label>
            <input id="speechSpeed" type="range" min="0.55" max="1.35" step="0.05" value="0.90">
          </div>
          <div class="speechLine">
            <label>卡片间隔 <span id="speechGapValue">0.5 秒</span></label>
            <input id="speechGap" type="range" min="0" max="2.5" step="0.25" value="0.5">
          </div>
          <div class="speechSwitches">
            <button class="pill active" id="speechLoopBtn" type="button">循环播放</button>
            <button class="pill active" id="speechKeepScreenBtn" type="button">尽量保活</button>
          </div>
          <div class="speechNow" id="speechNow">从当前卡开始，按当前筛选结果一直播放。</div>
        </div>
        <div class="modalBtns speechBtns">
          <button class="secondary" id="speechCloseBtn" type="button">关闭</button>
          <button class="secondary" id="speechStopBtn" type="button">停止</button>
          <button id="speechStartBtn" type="button">开始朗读</button>
        </div>
      </div>
    </section>


    <section class="modal" id="statsModal" aria-label="本轮统计">
      <div class="modalCard">
        <h2>本轮统计</h2>
        <div class="statGrid" id="statGrid"></div>
        <div class="modalBtns">
          <button class="secondary" id="resetStatsBtn" type="button">重置本轮</button>
          <button id="closeStatsBtn" type="button">关闭</button>
        </div>
      </div>
    </section>

    <section class="modal" id="distModal" aria-label="严格辨析">
      <div class="modalCard">
        <h2>严格辨析</h2>
        <div class="detailBody" id="distBody"></div>
        <div class="modalBtns">

          <button id="closeDistBtn" type="button">关闭</button>
        </div>
      </div>
    </section>

    function escapeHtml(value) {
      return String(value).replace(/[&<>'"]/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));
    }

    function shortDeck(deck) { return deck === '全部' ? '全部' : deck.replace(/^\d+\s*/, ''); }

    function normalize(value) {
      return String(value || '').toLowerCase().trim().replace(/[，。！？,.!?;；:：、/\\()（）\[\]【】"'`´’‘“”\s-]/g, '');
    }

    function answerParts(value) {
      return String(value || '').split(/[\/、；;，,]/).map(part => normalize(part)).filter(Boolean);
    }

    function baseFilteredCards() {
      const q = query.trim().toLowerCase();
      return allCards.filter(card => {
        if (activeDeck !== '全部' && card.deck !== activeDeck) return false;
        if (posFilter !== 'all' && card.pos !== posFilter) return false;
        if (statusFilter === 'focus') {
          const st = userStatus[card.id];
          if (!(st === 'fuzzy' || st === 'unknown' || wrongBook[card.id])) return false;
        }
        if (statusFilter === 'wrong' && !wrongBook[card.id]) return false;
        if (statusFilter === 'favorite' && !favorites[card.id]) return false;
        if (!q) return true;
        return [card.front, card.meaning, card.pos, card.gender, card.scene, card.deck, card.cefr, card.priority, card.example, card.exampleCn, card.notes, card.cardType, card.tags, String(card.id)]
          .some(value => String(value).toLowerCase().includes(q));
      });
    }

    function seededRandom(seed) {
      let value = Math.sin(seed) * 10000;
      return value - Math.floor(value);
    }

    function seededShuffle(list, seed) {
      const copy = list.slice();
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(seededRandom(seed + i * 97) * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function resetRandomOrder() {
      randomCardsCache = [];
      randomCardsSignature = '';
      if (!randomSeed) randomSeed = Date.now();
    }

    function filteredCards() {
      const list = baseFilteredCards();
      if (!randomMode) return list;
      const signature = list.map(card => card.id).join(',');
      if (!randomCardsCache.length || randomCardsSignature !== signature) {
        randomCardsSignature = signature;
        if (!randomSeed) randomSeed = Date.now();
        randomCardsCache = seededShuffle(list, randomSeed + list.length * 17);
        localStorage.setItem('ankiB1HighPlusRandomSeed', String(randomSeed));
      }
      return randomCardsCache;
    }

    function promptText(card) {
      if (!card) return '';
      if (mode === 'flip') return reverseMode ? card.meaning : card.front;
      if (mode === 'quiz') return reverseMode ? card.meaning : card.front;
      return reverseMode ? card.meaning : card.front;
    }

    function answerText(card) {
      if (!card) return '';
      if (mode === 'flip') return reverseMode ? card.front : card.meaning;
      if (mode === 'quiz') return reverseMode ? card.front : card.meaning;
      return reverseMode ? card.front : card.meaning;
    }

    function makeOptions(card) {
      const correctText = answerText(card);
      const sameDeck = allCards.filter(item => item.id !== card.id && item.deck === card.deck && (reverseMode ? item.front : item.meaning) !== correctText);
      const allPool = allCards.filter(item => item.id !== card.id && (reverseMode ? item.front : item.meaning) !== correctText);
      let pool = seededShuffle(sameDeck, card.id * (reverseMode ? 29 : 17));
      if (pool.length < 3) pool = seededShuffle([...sameDeck, ...allPool], card.id * 31);
      const used = new Set([correctText]);
      const wrong = [];
      for (const item of pool) {
        const text = reverseMode ? item.front : item.meaning;
        if (used.has(text)) continue;
        used.add(text);
        wrong.push({ text, correct: false, sourceId: item.id });
        if (wrong.length === 3) break;
      }
      return seededShuffle([...wrong, { text: correctText, correct: true, sourceId: card.id }], card.id * 43 + index + (reverseMode ? 5000 : 0));
    }

    function currentCard() {
      const cards = filteredCards();
      if (!cards.length) return null;
      if (index < 0) index = cards.length - 1;
      if (index >= cards.length) index = 0;
      return cards[index];
    }

    function makeExample(card) {
      if (card.example && card.exampleCn) return `${card.example} ｜ ${card.exampleCn}`;
      if (card.example) return card.example;
      if (card.notes) return `搭配：${card.notes}`;
      const f = card.front.trim();
      if (card.pos === '句型' || card.pos === '核心句型') return f;
      if (/^(der|die|das|ein|eine)\s+/i.test(f)) return `Das ist ${f}.`;
      if (/^sich\s+sorgen\s+machen$/i.test(f)) return 'Ich mache mir Sorgen.';
      if (/^sich\s+/i.test(f)) return `Ich muss ${f.replace(/^sich\s+/i, 'mich ')}.`;
      if (/^[a-zäöüß].*\s+.+/i.test(f)) return `Ich möchte ${f}.`;
      if (/(en|ern|eln)$/i.test(f)) return `Ich muss ${f}.`;
      return `Ich lerne das Wort „${f}“.`;
    }


    function showTtsStatus(message, hold = 1500) {

    function cleanGermanForSpeech(value) {
      return String(value || '')
        .replace(/\([^)]*\)/g, ' ')
        .replace(/\[[^\]]*\]/g, ' ')
        .replace(/…/g, '')
        .replace(/\.\.\./g, '')
        .replace(/\s*\+\s*(Akk|Dat|Gen|Nom)\.?/gi, ' ')
        .replace(/\bAkk\./gi, ' ')
        .replace(/\bDat\./gi, ' ')
        .replace(/\bGen\./gi, ' ')
        .replace(/\bNom\./gi, ' ')
        .replace(/\bjmdn\./gi, 'jemanden')
        .replace(/\bjdn\./gi, 'jemanden')
        .replace(/\bjmdm\./gi, 'jemandem')
        .replace(/\bjmd\./gi, 'jemand')
        .replace(/\betw\./gi, 'etwas')
        .replace(/\bz\.B\./gi, 'zum Beispiel')
        .replace(/\bCAD\b/g, 'C A D')
        .replace(/\bWG\b/g, 'W G')
        .replace(/\s*[|/]\s*/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function speechTextForCard(card) {
      if (!card) return '';
      let text = String(card.front || '');
      if ((text.includes('...') || text.includes('…')) && card.example) text = card.example;
      text = cleanGermanForSpeech(text);
      if (!text && card.example) text = cleanGermanForSpeech(card.example);
      return text.slice(0, 190);
    }

    function googleTtsUrl(text, slow = false) {
      const params = new URLSearchParams({
        ie: 'UTF-8',
        client: 'tw-ob',
        tl: 'de',
        q: text
      });
      if (slow) params.set('ttsspeed', '0.75');
      return 'https://translate.google.com/translate_tts?' + params.toString();
    }

    function pickGermanVoice() {
      if (!('speechSynthesis' in window)) return null;
      const voices = speechSynthesis.getVoices();
      return voices.find(v => String(v.lang || '').toLowerCase().startsWith('de')) || null;
    }

    function fallbackSystemGerman(text) {
      const voice = pickGermanVoice();
      if (!voice || !('speechSynthesis' in window)) {
        showTtsStatus('在线音频失败；本机也没有德语 voice', 2200);
        return;
      }
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = voice.lang || 'de-DE';
      u.voice = voice;
      u.rate = 0.88;
      u.pitch = 1;
      window.speechSynthesis.speak(u);
      showTtsStatus('使用本机德语 voice 备用播放');
    }

    function playCurrentGerman(slow = false) {
      const card = currentCard();
      const text = speechTextForCard(card);
      if (!text) {
        showTtsStatus('这张没有可播放的德语文本');
        return;
      }
      clearTimeout(speechTimer);
      try {
        naturalAudio.pause();
        naturalAudio.currentTime = 0;
      } catch (e) {}
      naturalAudio.src = googleTtsUrl(text, slow);
      naturalAudio.preload = 'auto';
      naturalAudio.playbackRate = slow ? 0.72 : 1;
      el.speakBtn.classList.add('speaking');
      showTtsStatus((slow ? '慢速播放：' : '自然发音：') + text, 2000);
      const p = naturalAudio.play();
      if (p && typeof p.catch === 'function') {
        p.catch(() => fallbackSystemGerman(text));
      }
    }


    function chineseTtsUrl(text, slow = false) {
      const params = new URLSearchParams({
        ie: 'UTF-8',
        client: 'tw-ob',
        tl: 'zh-CN',
        q: String(text || '').slice(0, 190)
      });
      if (slow) params.set('ttsspeed', '0.75');
      return 'https://translate.google.com/translate_tts?' + params.toString();
    }

    function cleanChineseForSpeech(value) {
      return String(value || '')
        .replace(/[；;\/|]/g, '，')
        .replace(/\s+/g, ' ')
        .trim()
        .slice(0, 150);
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function playAudioUrl(url, rate, token) {
      return new Promise((resolve, reject) => {
        if (token !== speechAbortToken) return resolve();
        const audio = naturalAudio;
        audio.pause();
        audio.currentTime = 0;
        audio.src = url;
        audio.preload = 'auto';
        audio.playbackRate = Math.max(0.5, Math.min(1.5, Number(rate) || 0.9));
        audio.onended = () => resolve();
        audio.onerror = () => reject(new Error('audio error'));
        audio.onpause = () => {
          if (speechModePlaying && token === speechAbortToken && !audio.ended) {
            if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
          }
        };
        audio.onplay = () => {
          if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';
        };
        const p = audio.play();
        if (p && typeof p.catch === 'function') p.catch(reject);
      });
    }

    function speechSettings() {
      return {
        deCount: Number(el.speechDeCount.value || 2),
        zhCount: Number(el.speechZhCount.value || 1),
        speed: Number(el.speechSpeed.value || 0.9),
        gap: Number(el.speechGap.value || 0.5) * 1000,
        loop: speechLoop
      };
    }

    function updateSpeechUiText() {
      if (!el.speechSpeedValue) return;
      el.speechSpeedValue.textContent = Number(el.speechSpeed.value || 0.9).toFixed(2) + 'x';
      el.speechGapValue.textContent = Number(el.speechGap.value || 0.5).toFixed(2).replace(/\.00$/, '') + ' 秒';
      el.speechLoopBtn.classList.toggle('active', speechLoop);
      el.speechKeepScreenBtn.classList.toggle('active', speechKeepScreen);
    }


    function updateMediaSession(card, phase = '德语') {
      if (!('mediaSession' in navigator) || !card) return;
      try {
        navigator.mediaSession.metadata = new MediaMetadata({
          title: String(card.front || '德语朗读'),
          artist: phase + ' ｜ ' + String(card.meaning || ''),
          album: '德语 B1 高段 Anki 朗读模式'
        });
        navigator.mediaSession.playbackState = speechModePlaying ? 'playing' : 'paused';
        navigator.mediaSession.setActionHandler('pause', () => stopSpeechMode('已暂停朗读模式'));
        navigator.mediaSession.setActionHandler('play', () => { if (!speechModePlaying) startSpeechMode(); });
        navigator.mediaSession.setActionHandler('stop', () => stopSpeechMode());
        navigator.mediaSession.setActionHandler('nexttrack', () => {
          if (speechModePlaying) {
            speechAbortToken++;
            index = Math.min(index + 1, filteredCards().length - 1);
            startSpeechMode();
          } else {
            move(1, 'bumpNext');
          }
        });
        navigator.mediaSession.setActionHandler('previoustrack', () => {
          if (speechModePlaying) {
            speechAbortToken++;
            index = Math.max(index - 1, 0);
            startSpeechMode();
          } else {
            move(-1, 'bumpPrev');
          }
        });
      } catch (e) {}
    }

    function makeSilenceWavUrl(seconds) {
      seconds = Math.max(0.05, Math.min(3, Number(seconds) || 0.1));
      const sampleRate = 8000;
      const samples = Math.floor(sampleRate * seconds);
      const buffer = new ArrayBuffer(44 + samples * 2);
      const view = new DataView(buffer);
      function writeString(offset, string) {
        for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
      }
      writeString(0, 'RIFF');
      view.setUint32(4, 36 + samples * 2, true);
      writeString(8, 'WAVE');
      writeString(12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, 1, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * 2, true);
      view.setUint16(32, 2, true);
      view.setUint16(34, 16, true);
      writeString(36, 'data');
      view.setUint32(40, samples * 2, true);
      return URL.createObjectURL(new Blob([buffer], { type: 'audio/wav' }));
    }

    async function playSilenceGap(ms, token) {
      const gap = Number(ms) || 0;
      if (gap <= 0 || token !== speechAbortToken) return;
      const url = makeSilenceWavUrl(gap / 1000);
      try {
        await playAudioUrl(url, 1, token);
      } finally {
        setTimeout(() => URL.revokeObjectURL(url), 2500);
      }
    }


    async function requestSpeechWakeLock() {
      if (!speechKeepScreen || !('wakeLock' in navigator)) return;
      try {
        speechWakeLock = await navigator.wakeLock.request('screen');
      } catch (e) {}
    }

    async function releaseSpeechWakeLock() {
      try {
        if (speechWakeLock) await speechWakeLock.release();
      } catch (e) {}
      speechWakeLock = null;
    }

    function stopSpeechMode(message = '已停止朗读模式') {
      speechAbortToken++;
      speechModePlaying = false;
      clearTimeout(speechTimer);
      try { naturalAudio.pause(); } catch(e) {}
      try { speechCnAudio.pause(); } catch(e) {}
      releaseSpeechWakeLock();
      if ('mediaSession' in navigator) { try { navigator.mediaSession.playbackState = 'paused'; } catch(e) {} }
      renderModeButtons();
      updateSpeechUiText();
      showTtsStatus(message, 1500);
      if (el.speechNow) el.speechNow.textContent = message;
    }

    async function startSpeechMode() {
      const list = filteredCards();
      if (!list.length) {
        showTtsStatus('当前筛选结果没有卡片', 1800);
        return;
      }

      speechAbortToken++;
      const token = speechAbortToken;
      speechModePlaying = true;
      autoSpeakNatural = false;
      localStorage.setItem('ankiB1HighPlusAutoSpeakNatural', 'false');
      renderModeButtons();
      updateSpeechUiText();
      await requestSpeechWakeLock();

      let startId = currentCard()?.id;
      let startIndex = Math.max(0, list.findIndex(card => card.id === startId));
      if (startIndex < 0) startIndex = 0;

      showTtsStatus('朗读模式已开始', 1600);

      try {
        do {
          for (let i = startIndex; i < list.length; i++) {
            if (!speechModePlaying || token !== speechAbortToken) return;
            const card = list[i];
            index = i;
            flipped = false;
            selectedOption = null;
            answerRevealed = false;
            currentOptions = [];
            renderCard();

            const settings = speechSettings();
            const deText = speechTextForCard(card);
            const zhText = cleanChineseForSpeech(card.meaning);

            if (el.speechNow) {
              el.speechNow.textContent = `正在朗读：${deText || card.front} ｜ ${card.meaning}`;
            }
            updateMediaSession(card, '德语');

            for (let d = 0; d < settings.deCount; d++) {
              if (!speechModePlaying || token !== speechAbortToken) return;
              if (deText) await playAudioUrl(googleTtsUrl(deText, settings.speed < 0.72), settings.speed, token);
              if (settings.gap) await playSilenceGap(Math.min(settings.gap, 1200), token);
            }

            updateMediaSession(card, '中文');
            for (let z = 0; z < settings.zhCount; z++) {
              if (!speechModePlaying || token !== speechAbortToken) return;
              if (zhText) await playAudioUrl(chineseTtsUrl(zhText, settings.speed < 0.72), Math.min(1.15, settings.speed + 0.05), token);
              if (settings.gap) await playSilenceGap(Math.min(settings.gap, 1200), token);
            }

            if (settings.gap) await playSilenceGap(settings.gap, token);
          }
          startIndex = 0;
        } while (speechModePlaying && token === speechAbortToken && speechLoop);

        stopSpeechMode('朗读完成');
      } catch (e) {
        stopSpeechMode('朗读中断：在线音频加载失败');
      }
    }


    function scheduleSpeakCurrent() {
      clearTimeout(speechTimer);
      if (!autoSpeakNatural) return;
      speechTimer = setTimeout(() => playCurrentGerman(false), 260);
    }

    naturalAudio.addEventListener('ended', () => {
      el.speakBtn.classList.remove('speaking');
      renderModeButtons();
    });
    naturalAudio.addEventListener('pause', () => {
      el.speakBtn.classList.remove('speaking');
      renderModeButtons();
    });
    naturalAudio.addEventListener('error', () => {
      el.speakBtn.classList.remove('speaking');
      fallbackSystemGerman(speechTextForCard(currentCard()));
      renderModeButtons();
    });

    if ('speechSynthesis' in window) {
      window.speechSynthesis.onvoiceschanged = () => {};
    }

    function renderOptions(card) {
      if (!card) return;
      if (!currentOptions.length || currentOptions.every(option => option.sourceId !== card.id)) currentOptions = makeOptions(card);
      const buttons = Array.from(el.options.querySelectorAll('.choice'));
      buttons.forEach((button, optionIndex) => {
        const option = currentOptions[optionIndex];
        button.disabled = false;
        button.className = 'choice';
        button.dataset.correct = option.correct ? 'true' : 'false';
        button.querySelector('span').textContent = option.text;
        if (selectedOption !== null || answerRevealed) {
          if (option.correct) button.classList.add('correct');
          if (selectedOption === optionIndex && !option.correct) button.classList.add('wrong');
          if (selectedOption !== null && selectedOption !== optionIndex && !option.correct) button.classList.add('dim');
        }
      });
    }

    function renderStatusButtons(card) {
      document.querySelectorAll('[data-status]').forEach(button => button.classList.toggle('active', !!card && userStatus[card.id] === button.dataset.status));
    }

    function renderCard() {
      renderModeButtons();
      const cards = filteredCards();
      if (!cards.length) {
        flipped = false; el.card.classList.remove('flipped', 'longPrompt', 'veryLongPrompt', 'longAnswer', 'veryLongAnswer');
        el.counter.textContent = '0 / 0';
        el.frontDeck.textContent = activeDeck; el.backDeck.textContent = activeDeck;

    function normalizeFrontKey(text) {
      return String(text || '').toLowerCase().replace(/[“”"'.,!?。！？]/g, '').replace(/\s+/g, ' ').trim();
    }

    function normalizeMeaningText(text) {
      return String(text || '').toLowerCase().replace(/[\s。！？!?,，、；;：:（）()\[\]【】“”"']/g, '').trim();
    }

    function meaningParts(text) {
      return String(text || '')
        .split(/[；;、,，/｜|]/)
        .map(item => item.replace(/[。！？!?.（）()\[\]【】“”"']/g, '').trim())
        .filter(item => item && item.length >= 2);
    }

    function findStrictRule(card) {
      const key = normalizeFrontKey(card.front);
      return strictDistinctionGroups.find(group => group.keys.some(k => key === k || key.includes(k) || k.includes(key)));
    }

    function findSimilarCards(card) {
      const exact = normalizeMeaningText(card.meaning);
      const parts = meaningParts(card.meaning);
      const candidates = allCards.filter(item => {
        if (item.id === card.id) return false;
        const itemExact = normalizeMeaningText(item.meaning);
        if (exact && itemExact === exact) return true;
        const itemParts = meaningParts(item.meaning);
        return parts.some(p => itemParts.includes(p));
      });
      candidates.sort((a, b) => {
        const da = a.deck === card.deck ? 0 : 1;
        const db = b.deck === card.deck ? 0 : 1;
        const ea = normalizeMeaningText(a.meaning) === exact ? 0 : 1;
        const eb = normalizeMeaningText(b.meaning) === exact ? 0 : 1;
        return ea - eb || da - db || a.id - b.id;
      });
      return candidates.slice(0, 8);
    }

    function cardMiniLine(item, current) {
      const sameMeaning = normalizeMeaningText(item.meaning) === normalizeMeaningText(current.meaning);
      const typeNote = item.pos === current.pos ? item.pos : `${item.pos}，不是${current.pos}`;
      const scene = String(item.deck || '').replace(/^\d+\s*/, '');
      const example = item.example ? `；例：${item.example}${item.exampleCn ? ' = ' + item.exampleCn : ''}` : '';
      const duplicate = item.front === current.front ? '同一词在不同章节重复出现，按场景复习即可' : (sameMeaning ? '中文完全相同，必须靠词性/搭配/场景区分' : '中文部分重合，不等于完全同义');
      return `<li><b>${escapeHtml(item.front)}</b> = ${escapeHtml(item.meaning)}｜${escapeHtml(typeNote)}｜${escapeHtml(scene)}<br><span class="distSmall">${escapeHtml(duplicate + example)}</span></li>`;
    }

    function buildDistinctionHtml(card) {
      const rule = findStrictRule(card);
      const similar = findSimilarCards(card);
      const tags = [card.cefr, card.priority, card.cardType, card.pos].filter(Boolean).map(t => `<span class="distTag">${escapeHtml(t)}</span>`).join('');
      let html = `<div class="distBlock"><h3>${escapeHtml(card.front)}</h3><p><b>当前中文：</b>${escapeHtml(card.meaning)}</p><p>${tags}</p><p class="distSmall">${escapeHtml(card.scene || card.deck || '')}</p></div>`;
      if (rule) {
        html += `<div class="distBlock"><h3>${escapeHtml(rule.title)}</h3><ul>${rule.lines.map(line => `<li>${escapeHtml(line)}</li>`).join('')}</ul></div>`;
      } else {
        html += `<div class="distBlock"><h3>区分原则</h3><ul><li>中文翻译相同不代表德语能互换。德语先看三件事：词性、固定搭配、使用场景。</li><li>${escapeHtml(card.front)} 当前类型是 ${escapeHtml(card.pos)}，场景是 ${escapeHtml(card.deck)}。如果另一个词是名词/句型/词块，语法位置就不同。</li><li>背这类词时不要只背中文，要连同例句和搭配一起记。</li></ul></div>`;
      }
      if (card.example || card.exampleCn) {
        html += `<div class="distBlock"><h3>本词例句</h3><p>${escapeHtml(card.example || '')}${card.exampleCn ? ' ｜ ' + escapeHtml(card.exampleCn) : ''}</p></div>`;
      }
      if (similar.length) {
        html += `<div class="distBlock"><h3>同中文/近中文词条</h3><ul>${similar.map(item => cardMiniLine(item, card)).join('')}</ul></div>`;
      } else {
        html += `<div class="distBlock"><h3>同中文词条</h3><p class="distWarn">当前没有找到完全同中文的其他词条。这个词先按例句和分类记。</p></div>`;
      }
      html += `<div class="distBlock"><h3>记忆方式</h3><p>这张卡不要只回答“${escapeHtml(card.meaning)}”，要能说出：<b>${escapeHtml(card.front)}</b> 用在什么场景、常和什么词连用、不能替换成哪一个近义词。</p></div>`;
      return html;
    }

    function showDistinction() {
      const card = currentCard();
      if (!card) return;
      el.distBody.innerHTML = buildDistinctionHtml(card);
      el.distModal.classList.add('show');
    }
    function showStats() {
      const seenCount = Object.keys(session.seen).length;
      const totalWrong = Object.keys(wrongBook).length;
      const favCount = Object.keys(favorites).length;
      const focusCount = allCards.filter(card => userStatus[card.id] === 'fuzzy' || userStatus[card.id] === 'unknown' || wrongBook[card.id]).length;
      const boxes = [
        ['本轮看过', seenCount], ['本轮作答', session.answered], ['答对', session.correct], ['答错', session.wrong],
        ['标记认识', session.known], ['标记模糊', session.fuzzy], ['标记不认识', session.unknown], ['当前错题', totalWrong],
        ['重点池', focusCount], ['星标', favCount]
      ];
      el.statGrid.innerHTML = boxes.map(([name, value]) => `<div class="statBox"><b>${value}</b><span>${name}</span></div>`).join('');
      el.statsModal.classList.add('show');
    }

    function resetSessionStats() {
      Object.keys(session).forEach(key => { if (key === 'seen') session.seen = {}; else session[key] = 0; });
      showStats();
    }

    function changeFilter(newFilter) {
      statusFilter = newFilter;
      localStorage.setItem('ankiB1HighPlusStatusFilter', statusFilter);
      index = 0; resetRandomOrder(); resetAnswerState(); renderCard();
    }

    function changeMode(newMode) {
      mode = newMode;
      localStorage.setItem('ankiB1HighPlusMode', mode);
      resetAnswerState(); renderCard();
    }

    document.querySelectorAll('[data-mode]').forEach(button => button.addEventListener('click', () => changeMode(button.dataset.mode)));
    document.querySelectorAll('[data-filter]').forEach(button => button.addEventListener('click', () => changeFilter(button.dataset.filter)));
    document.querySelectorAll('[data-status]').forEach(button => button.addEventListener('click', () => setStatus(button.dataset.status)));
    document.querySelectorAll('.rate').forEach(button => button.addEventListener('click', () => rate(button.dataset.score)));
    document.querySelectorAll('.choice').forEach(button => button.addEventListener('click', () => answerOption(Number(button.dataset.option))));

    el.clearStatusBtn.addEventListener('click', clearStatus);
    el.favoriteBtn.addEventListener('click', toggleFavorite);
    el.exampleBtn.addEventListener('click', () => { exampleVisible = !exampleVisible; renderCard(); });
    el.speakBtn.addEventListener('click', (event) => { event.stopPropagation(); playCurrentGerman(false); });
    el.speakBtn.addEventListener('dblclick', (event) => { event.stopPropagation(); playCurrentGerman(true); });
    el.autoSpeakBtn.addEventListener('click', (event) => {
      event.stopPropagation();
      autoSpeakNatural = !autoSpeakNatural;
      localStorage.setItem('ankiB1HighPlusAutoSpeakNatural', String(autoSpeakNatural));
      renderModeButtons();
      if (autoSpeakNatural) playCurrentGerman(false); else { clearTimeout(speechTimer); try { naturalAudio.pause(); } catch(e) {} showTtsStatus('已关闭自动读'); }
    });

    el.speechModeBtn.addEventListener('click', (event) => {
      event.stopPropagation();
      updateSpeechUiText();
      el.speechModal.classList.add('show');
    });
    el.speechCloseBtn.addEventListener('click', () => el.speechModal.classList.remove('show'));
    el.speechStartBtn.addEventListener('click', () => {
      el.speechModal.classList.remove('show');
      startSpeechMode();
    });
    el.speechStopBtn.addEventListener('click', () => stopSpeechMode());
    el.speechSpeed.addEventListener('input', updateSpeechUiText);
    el.speechGap.addEventListener('input', updateSpeechUiText);
    el.speechLoopBtn.addEventListener('click', () => {
      speechLoop = !speechLoop;
      localStorage.setItem('ankiB1SpeechLoop', String(speechLoop));
      updateSpeechUiText();
    });
    el.speechKeepScreenBtn.addEventListener('click', () => {
      speechKeepScreen = !speechKeepScreen;
      localStorage.setItem('ankiB1SpeechKeepScreen', String(speechKeepScreen));
      updateSpeechUiText();
    });
    window.addEventListener('beforeunload', () => { try { naturalAudio.pause(); } catch(e) {} });
    document.addEventListener('visibilitychange', async () => {
      if (document.visibilityState === 'visible' && speechModePlaying && speechKeepScreen) {
        await requestSpeechWakeLock();
      }
    });
    updateSpeechUiText();

    el.distinguishBtn.addEventListener('click', showDistinction);
    el.closeDistBtn.addEventListener('click', () => el.distModal.classList.remove('show'));
    el.markFuzzyFromDistBtn.addEventListener('click', () => { el.distModal.classList.remove('show'); setStatus('fuzzy'); });
    el.statsBtn.addEventListener('click', showStats);
    el.closeStatsBtn.addEventListener('click', () => el.statsModal.classList.remove('show'));
    el.resetStatsBtn.addEventListener('click', resetSessionStats);
    el.prevBtn.addEventListener('click', () => move(-1, 'bumpPrev'));
    el.nextBtn.addEventListener('click', () => move(1, 'bumpNext'));
    el.actionBtn.addEventListener('click', flipOrReveal);
    el.card.addEventListener('click', flipOrReveal);
    el.checkTypeBtn.addEventListener('click', checkTypeAnswer);

    el.autoNextBtn.addEventListener('click', () => {
      if (mode !== 'quiz') changeMode('quiz');
      autoNext = !autoNext;
      localStorage.setItem('ankiB1HighPlusAutoNext', String(autoNext));
      renderCard(); scheduleAutoNext();
    });
    el.randomBtn.addEventListener('click', () => {
      randomMode = !randomMode;
      localStorage.setItem('ankiB1HighPlusRandomMode', String(randomMode));
      randomSeed = Date.now(); resetRandomOrder(); index = 0; resetAnswerState(); renderCard();
    });
    el.reverseBtn.addEventListener('click', () => {
      reverseMode = !reverseMode;
      localStorage.setItem('ankiB1HighPlusReverseMode', String(reverseMode));
      resetAnswerState(); renderCard();
    });
    el.search.addEventListener('input', event => {
      query = event.target.value; index = 0; resetRandomOrder(); resetAnswerState(); renderCard();
    });
    el.posSelect.addEventListener('change', event => {
      posFilter = event.target.value;
      localStorage.setItem('ankiB1HighPlusPosFilter', posFilter);
      index = 0; resetRandomOrder(); resetAnswerState(); renderCard();
    });
    el.typeInput.addEventListener('keydown', event => {
      if (event.key === 'Enter') { event.preventDefault(); checkTypeAnswer(); }
    });

    el.card.addEventListener('touchstart', event => {
      const touch = event.changedTouches[0]; touchStartX = touch.clientX; touchStartY = touch.clientY;
    }, { passive: true });
    el.card.addEventListener('touchend', event => {
      const touch = event.changedTouches[0]; const dx = touch.clientX - touchStartX; const dy = touch.clientY - touchStartY;
      if (Math.abs(dx) > 45 && Math.abs(dx) > Math.abs(dy) * 1.35) dx < 0 ? move(1, 'bumpNext') : move(-1, 'bumpPrev');
    }, { passive: true });

    document.addEventListener('keydown', event => {
      const isTyping = document.activeElement === el.search || document.activeElement === el.typeInput;
      if (isTyping && event.key !== 'Escape') return;
      if (event.key === 'ArrowRight') move(1, 'bumpNext');
      if (event.key === 'ArrowLeft') move(-1, 'bumpPrev');
      if (event.key === ' ' || event.key === 'Enter') { event.preventDefault(); flipOrReveal(); }
      if (event.key === 'Escape') {
        el.search.blur(); el.typeInput.blur(); el.statsModal.classList.remove('show'); el.distModal.classList.remove('show');
        el.search.value = ''; query = ''; index = 0; resetRandomOrder(); resetAnswerState(); renderCard();
      }
      if (['1','2','3','4'].includes(event.key)) {
        if (mode === 'quiz') answerOption(Number(event.key) - 1);
        else if (mode === 'type') checkTypeAnswer();
        else {
          const map = { '1':'again', '2':'hard', '3':'good', '4':'easy' };
          rate(map[event.key]);
        }
      }
      if (event.key.toLowerCase() === 'k') setStatus('known');
      if (event.key.toLowerCase() === 'f') setStatus('fuzzy');
      if (event.key.toLowerCase() === 'u') setStatus('unknown');
      if (event.key === '*') toggleFavorite();
    });

    document.addEventListener('touchmove', event => {
      if (!event.target.closest('.strip') && !event.target.closest('.detailBody')) event.preventDefault();
    }, { passive: false });

    window.addEventListener('resize', () => requestAnimationFrame(renderCard));
    renderPosSelect();
    renderDecks();
    renderCard();
    window.__DATASET_INFO__ = { source: '德语B1高段_3000词条完整版_分类版.xlsx', cards: allCards.length, decks: deckList.length, features: ['status','focus','wrongbook','posFilter','reverse','typing','stats','favorite','example','distinction','random','autoNext'] };
  </script>
</body>
</html>
